<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试</title>
</head>
<body>
  <div id="app"></div>
  <script>
    function startTest() {
      document.getElementById('app').innerHTML = '<h2>✅ 按钮正常工作了！</h2><p>开始答题吧</p><button onclick="showQ()">下一题</button>';
    }
    function showQ() {
      document.getElementById('app').innerHTML = '<h3>第1题</h3><p>这是测试题目</p><button onclick="showAlert()">选A</button>';
    }
    function showAlert() {
      alert('✅ 所有功能正常！');
    }
    
    // 显示开始按钮
    document.getElementById('app').innerHTML = '<button onclick="startTest()" style="font-size:20px;padding:20px">开始测试</button>';
    console.log('页面已加载');
  </script>
</body>
</html>
