<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MBTI 十六型人格测试</title>
<style>
:root{--primary:#6C5CE7;--primary-light:#a29bfe;--primary-dark:#4834d4;--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--text:#e0e0e0;--text-light:#a0a0b0;--accent:#00cec9;--accent2:#fd79a8;--radius:16px;--shadow:0 8px 32px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow-x:hidden}
.container{width:100%;max-width:480px;min-height:100vh;position:relative;display:flex;flex-direction:column;justify-content:center;padding:20px}

/*Start Screen*/
#start-screen{text-align:center;animation:fadeUp .8s ease}
.logo{width:100px;height:100px;margin:0 auto 24px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 0 40px rgba(108,92,231,.4)}
h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.subtitle{color:var(--text-light);font-size:14px;margin-bottom:32px;line-height:1.6}
.features{display:flex;flex-direction:column;gap:12px;margin-bottom:32px;text-align:left}
.feature-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border-radius:12px;font-size:14px;border:1px solid rgba(255,255,255,.05)}
.feature-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;transition:all .3s ease;text-align:center}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 8px 24px rgba(108,92,231,.35)}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid rgba(255,255,255,.1)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}

/*Question Screen*/
#question-screen{display:none;animation:fadeUp .5s ease}
.progress-container{margin-bottom:20px}
.progress-text{display:flex;justify-content:space-between;font-size:13px;color:var(--text-light);margin-bottom:6px}
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .5s ease}
.question-card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;border:1px solid rgba(255,255,255,.05)}
.dim-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:12px}
.dim-EI{background:rgba(108,92,231,.2);color:#a29bfe}
.dim-SN{background:rgba(0,206,201,.2);color:#00cec9}
.dim-TF{background:rgba(253,121,168,.2);color:#fd79a8}
.dim-JP{background:rgba(255,218,121,.2);color:#ffda79}
.question-number{font-size:12px;color:var(--text-light);margin-bottom:8px}
.question-text{font-size:17px;line-height:1.6;font-weight:500;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card2);border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all .25s ease;font-size:15px;line-height:1.5;text-align:left}
.option:hover{border-color:var(--primary-light);background:rgba(108,92,231,.1)}
.option.selected{border-color:var(--primary);background:rgba(108,92,231,.15)}
.option-letter{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:var(--text-light)}
.option.selected .option-letter{background:var(--primary);color:#fff}

/*Result Screen*/
#result-screen{display:none;animation:fadeUp .6s ease}
.result-header{text-align:center;margin-bottom:24px}
.type-badge{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:12px 24px;border-radius:50px;font-size:24px;font-weight:800;letter-spacing:2px;margin-bottom:12px;box-shadow:0 8px 24px rgba(108,92,231,.3)}
.type-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.type-en{font-size:14px;color:var(--text-light);margin-bottom:6px}
.type-desc{font-size:14px;color:var(--text-light);line-height:1.7;max-width:400px;margin:0 auto}

/*Score Bars*/
.scores-section{margin-bottom:20px}
.score-title{font-size:13px;color:var(--text-light);margin-bottom:12px;font-weight:600}
.score-item{margin-bottom:12px}
.score-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.score-label .letter{font-weight:700;font-size:13px}
.score-bar-track{height:24px;background:rgba(255,255,255,.06);border-radius:12px;overflow:hidden;position:relative;display:flex}
.score-bar-half{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:rgba(255,255,255,.3);transition:all .8s ease;position:relative}
.score-bar-left{justify-content:flex-start;padding-left:8px}
.score-bar-right{justify-content:flex-end;padding-right:8px}
.score-bar-fill{position:absolute;top:0;height:100%;border-radius:12px;transition:all .8s ease;opacity:0}
.score-bar-fill.animate{opacity:1}
.score-bar-fill.left{left:0;background:linear-gradient(90deg,var(--primary),var(--accent))}
.score-bar-fill.right{right:0;background:linear-gradient(90deg,var(--accent2),#e17055)}

/*Analysis Cards*/
.analysis-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.analysis-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.05)}
.analysis-card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.analysis-card h3 span{font-size:18px}
.tag-list{display:flex;flex-wrap:wrap;gap:8px}
.tag{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500}
.tag-good{background:rgba(0,206,201,.15);color:#00cec9}
.tag-bad{background:rgba(253,121,168,.15);color:#fd79a8}
.tag-career{background:rgba(108,92,231,.15);color:#a29bfe}

/*Restart Button*/
.restart-area{margin-top:20px;text-align:center}

/*Animations*/
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 2s infinite}

/*Responsive*/
@media(max-width:400px){
  .container{padding:16px}
  h1{font-size:24px}
  .question-text{font-size:15px}
  .option{font-size:14px;padding:12px 14px}
  .type-badge{font-size:20px;padding:10px 20px}
}
</style>
</head>
<body>
<div class="container" id="app"></div>

  ISTJ:{zh:"物流师",en:"Logistician",desc:"务实且注重事实，其可靠性不容置疑。",strengths:["诚实可靠","强烈的责任感","耐心","努力","有条理","务实高效"],weaknesses:["固执","不灵活","过于传统","评判性强","不善变通"],careers:["会计师","律师","军官","医生","法官","审计师"]},
  ISFJ:{zh:"守卫者",en:"Defender",desc:"非常敬业和温暖的守护者，总是愿意保护他们所爱的人。",strengths:["支持他人","可靠","善于观察","热情","注重细节","尽职尽责"],weaknesses:["过于谦虚","压抑感情","不愿改变","太利他","容易疲惫"],careers:["护士","教师","行政助理","社会工作者","心理咨询师","幼师"]},
  ESTJ:{zh:"总经理",en:"Executive",desc:"出色的管理者，在管理事务或人员方面无与伦比。",strengths:["有组织能力","忠诚","可靠","坚强","高效执行","条理清晰"],weaknesses:["不灵活","固执","感情迟钝","霸道","不容异议"],careers:["经理","律师","法官","财务顾问","军官","行政主管"]},
  ESFJ:{zh:"执政官",en:"Consul",desc:"极其关心他人，善于社交且受欢迎，总是热心帮助别人。",strengths:["关心他人","忠诚","敏感","勤奋","善于社交","有责任心"],weaknesses:["需要认可","过于利他","不灵活","太传统","容易焦虑"],careers:["护士","教师","社会工作者","销售经理","客服主管","活动策划"]},
  ISTP:{zh:"鉴赏家",en:"Virtuoso",desc:"大胆而实际的实验家，擅长使用各种形式的工具。",strengths:["乐观冷静","精力充沛","善于创造","实用","动手能力强","灵活应变"],weaknesses:["固执","对感情迟钝","私有性强","容易冒险","不善规划"],careers:["工程师","机械师","飞行员","运动员","外科医生","程序员"]},
  ISFP:{zh:"探险家",en:"Adventurer",desc:"灵活迷人的艺术家，总是带着快乐的探索精神。",strengths:["迷人","富有创意","敏感","冒险","审美力强","有同理心"],weaknesses:["不切实际","自我批判","容易紧张","过于竞争","不善决策"],careers:["艺术家","设计师","厨师","兽医","按摩师","园林师"]},
  ESTP:{zh:"企业家",en:"Entrepreneur",desc:"聪明、精力充沛且善于感知的人，真的很喜欢生活。",strengths:["大胆","直接","理性","实际","应变力强","有说服力"],weaknesses:["不敏感","不守规矩","鲁莽","不擅长期规划","容易招摇"],careers:["企业家","销售代表","演员","警官","飞行员","体育教练"]},
  ESFP:{zh:"表演者",en:"Entertainer",desc:"自发性、精力充沛、热情的表演者——生活在他们周围永远不会无聊。",strengths:["大胆","独创","审美力强","善于观察","乐观开朗","社交达人"],weaknesses:["难以专注","回避冲突","容易受伤","缺乏规划","容易分心"],careers:["演员","活动策划","教练","销售代表","导游","主持人"]}
};

// ======= State =======
let answers = {};
const dimMap = {E:"EI",I:"EI",S:"SN",N:"SN",T:"TF",F:"TF",J:"JP",P:"JP"};
const dimNames = {EI:{a:"外向",b:"内向"},SN:{a:"实感",b:"直觉"},TF:{a:"思考",b:"情感"},JP:{a:"判断",b:"感知"}};
const dimLetters = {EI:"EI",SN:"SN",TF:"TF",JP:"JP"};
let current = -1;
let app = document.getElementById('app');

// ======= Render =======
function render(){
  if(current === -1) showStart();
  else if(current < MBTI_QUESTIONS.length) showQuestion();
  else showResult();
}

function showStart(){
  app.innerHTML=`
    <div id="start-screen">
      <div class="logo">🧠</div>
      <h1>MBTI 性格测试</h1>
      <p class="subtitle">60道精选题目 · 16种人格类型<br>深入了解你的性格密码</p>
      <div class="features">
        <div class="feature-item"><div class="feature-icon" style="background:rgba(108,92,231,.2)">⏱️</div><span>约 <strong>8-12 分钟</strong> 完成测试</span></div>
        <div class="feature-item"><div class="feature-icon" style="background:rgba(0,206,201,.2)">📊</div><span>四维度深度分析报告</span></div>
        <div class="feature-item"><div class="feature-icon" style="background:rgba(253,121,168,.2)">💼</div><span>性格匹配 <strong>职业推荐</strong></span></div>
      </div>
      <button class="btn btn-primary" onclick="startTest()">开始测试 →</button>
    </div>`;
}

function startTest(){current=0;answers={};render();}

function dimColor(d){
  return 'dim-'+d;
}

function showQuestion(){
  let q = MBTI_QUESTIONS[current];
  let total = MBTI_QUESTIONS.length;
  let pct = Math.round((current/total)*100);
  let sel = answers[q.id];
  
  app.innerHTML=`
    <div id="question-screen" style="display:block">
      <div class="progress-container">
        <div class="progress-text">
          <span>第 ${current+1} / ${total} 题</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="question-card">
        <span class="dim-tag ${dimColor(q.dim)}">${q.dim === 'EI' ? '内向I / 外向E' : q.dim === 'SN' ? '实感S / 直觉N' : q.dim === 'TF' ? '思考T / 情感F' : '判断J / 感知P'}</span>
        <div class="question-number">Q${current+1}</div>
        <div class="question-text">${q.q}</div>
        <div class="options">
          <div class="option${sel===q.dim[0]?' selected':''}" onclick="selectAnswer(${q.id},'${q.dim[0]}')">
            <span class="option-letter">${q.dim[0]}</span>
            <span>${q.a}</span>
          </div>
          <div class="option${sel===q.dim[1]?' selected':''}" onclick="selectAnswer(${q.id},'${q.dim[1]}')">
            <span class="option-letter">${q.dim[1]}</span>
            <span>${q.b}</span>
          </div>
        </div>
      </div>
      <button class="btn btn-primary pulse" onclick="nextQuestion()" ${!answers[q.id]?'style="opacity:.5"':''}>${current<total-1?'下一题 →':'查看结果 →'}</button>
    </div>`;
}

function selectAnswer(id,val){
  answers[id]=val;
  let total = MBTI_QUESTIONS.length;
  if(current < total-1){
    // auto-advance with slight delay
    current++;
    setTimeout(render,300);
  } else {
    // last question, show result
    current = total;
    setTimeout(render,400);
  }
}

function nextQuestion(){
  let q = MBTI_QUESTIONS[current];
  if(!answers[q.id]) return;
  let total = MBTI_QUESTIONS.length;
  if(current < total-1){
    current++;
    render();
  } else {
    current = total;
    render();
  }
}

function showResult(){
  let result = calculateType();
  let type = MBTI_TYPES[result];
  if(!type) type = MBTI_TYPES.INTJ;
  
  let scores = calculateScores();
  let bars = '';
  for(let dim of ['EI','SN','TF','JP']){
    let s = scores[dim];
    let leftPct = Math.round(((s.a)/(s.a+s.b))*100);
    let rightPct = 100-leftPct;
    bars += `
      <div class="score-item">
        <div class="score-label">
          <span><span class="letter">${dim[0]}</span> ${dimNames[dim].a}</span>
          <span>${dimNames[dim].b} <span class="letter">${dim[1]}</span></span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-half score-bar-left">${leftPct}%</div>
          <div class="score-bar-half score-bar-right">${rightPct}%</div>
          <div class="score-bar-fill left animate" style="width:${leftPct}%"></div>
        </div>
      </div>`;
  }

  let strengthsHTML = type.strengths.map(s => `<span class="tag tag-good">${s}</span>`).join('');
  let weaknessesHTML = type.weaknesses.map(s => `<span class="tag tag-bad">${s}</span>`).join('');
  let careersHTML = type.careers.map(s => `<span class="tag tag-career">${s}</span>`).join('');

  // Save to localStorage
  let history = JSON.parse(localStorage.getItem('mbti_history')||'[]');
  history.unshift({result,date:new Date().toLocaleString('zh-CN')});
  if(history.length>10) history = history.slice(0,10);
  localStorage.setItem('mbti_history',JSON.stringify(history));

  app.innerHTML=`
    <div id="result-screen" style="display:block">
      <div class="result-header">
        <div class="type-badge">${result}</div>
        <div class="type-title">${type.zh} · ${type.en}</div>
        <div class="type-en">${type.en}</div>
        <div class="type-desc">${type.desc}</div>
      </div>
      
      <div class="scores-section">
        <div class="score-title">📊 四维度得分</div>
        ${bars}
      </div>
      
      <div class="analysis-grid">
        <div class="analysis-card">
          <h3><span>💪</span>优势特质</h3>
          <div class="tag-list">${strengthsHTML}</div>
        </div>
        <div class="analysis-card">
          <h3><span>⚠️</span>成长空间</h3>
          <div class="tag-list">${weaknessesHTML}</div>
        </div>
        <div class="analysis-card">
          <h3><span>💼</span>推荐职业</h3>
          <div class="tag-list">${careersHTML}</div>
        </div>
      </div>

      <div class="restart-area">
        <button class="btn btn-secondary" onclick="startTest()">🔄 重新测试</button>
      </div>
    </div>`;
  
  // Animate score bars
  setTimeout(()=>{
    document.querySelectorAll('.score-bar-fill').forEach(el=>el.classList.add('animate'));
  },100);
}

function calculateType(){
  let scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  for(let q of MBTI_QUESTIONS){
    let v = answers[q.id];
    if(v) scores[v]++;
  }
  return (
    (scores.E>scores.I?'E':'I')+
    (scores.S>scores.N?'S':'N')+
    (scores.T>scores.F?'T':'F')+
    (scores.J>scores.P?'J':'P')
  );
}

function calculateScores(){
  let scores = {
    EI:{a:scores_b('EI','E'),b:scores_b('EI','I')},
    SN:{a:scores_b('SN','S'),b:scores_b('SN','N')},
    TF:{a:scores_b('TF','T'),b:scores_b('TF','F')},
    JP:{a:scores_b('JP','J'),b:scores_b('JP','P')}
  };
  return scores;
  
  function scores_b(dim,letter){
    let count = 0;
    for(let q of MBTI_QUESTIONS){
      if(q.dim===dim && answers[q.id]===letter) count++;
    }
    return count;
  }
}

render();
</script>
</body>
</html>
