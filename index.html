<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI人格测试 - 完整版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        /* 页面切换 */
        .page { display: none; padding: 40px 30px; }
        .page.active { display: block; }
        
        /* 首页 */
        #intro-page { text-align: center; }
        #intro-page h1 { 
            color: #667eea; 
            font-size: 2.5em; 
            margin-bottom: 10px;
        }
        #intro-page .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 10px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary {
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        /* 测试页 */
        .progress-bar {
            background: #e0e0e0;
            height: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .question-counter {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.3em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #333;
        }
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option {
            background: #f8f9fa;
            padding: 18px 20px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .option:active { background: #e9ecef; }
        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        .nav-buttons .btn { flex: 1; margin: 0 5px; }
        
        /* 结果页 */
        #result-page { text-align: center; }
        .result-type {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        .result-description {
            text-align: left;
            color: #555;
            line-height: 1.8;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .container { margin: 0; border-radius: 0; }
            .page { padding: 20px 15px; }
            #intro-page h1 { font-size: 1.8em; }
            .question-text { font-size: 1.1em; }
            .option { padding: 14px 16px; }
            .btn { padding: 12px 25px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="intro-page" class="page active">
            <h1>MBTI人格测试</h1>
            <p class="subtitle">93道题 · 专业分析 · 历史对比</p>
            
            <div style="text-align: left; margin: 30px 0; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                <h3 style="color: #667eea; margin-bottom: 15px;">✨ 测试特色</h3>
                <ul style="list-style: none; padding: 0;">
                    <li style="margin-bottom: 10px;">📊 <strong>详细数据分析</strong>：维度百分比、认知功能栈、雷达图</li>
                    <li style="margin-bottom: 10px;">💾 <strong>数据自动留存</strong>：本地保存所有测试记录</li>
                    <li style="margin-bottom: 10px;">📈 <strong>历史数据对比</strong>：可视化对比多次测试结果</li>
                    <li style="margin-bottom: 10px;">📝 <strong>个性化报告</strong>：职业建议、关系建议、成长路径</li>
                </ul>
            </div>
            
            <button class="btn" onclick="startTest()">开始测试</button>
            <button class="btn btn-secondary" onclick="showHistory()" style="margin-top: 10px;">查看历史记录</button>
            
            <p style="margin-top: 20px; color: #999; font-size: 0.9em;">
                预计用时 15-20 分钟<br>所有数据仅保存在本地浏览器
            </p>
        </div>

        <!-- 测试页 -->
        <div id="test-page" class="page">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="question-counter" id="question-counter">第 1 题 / 共 93 题</div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options-container"></div>
            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()">上一题</button>
                <button class="btn" id="next-btn" onclick="nextQuestion()">下一题</button>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="result-page" class="page">
            <h1>测试完成！</h1>
            <div class="result-type" id="result-type">INTJ</div>
            <div class="result-description" id="result-description"></div>
            <button class="btn" onclick="restartTest()" style="margin-top: 20px;">重新测试</button>
            <button class="btn btn-secondary" onclick="showHistory()" style="margin-top: 10px;">查看历史记录</button>
        </div>

        <!-- 历史记录页 -->
        <div id="history-page" class="page">
            <h1 style="color: #667eea; margin-bottom: 20px;">历史记录</h1>
            <div id="history-list"></div>
            <button class="btn" onclick="showPage('intro-page')" style="margin-top: 20px;">返回首页</button>
        </div>
    </div>

    <script>
        // ========== 题目数据（简化版，5道题用于测试）==========
        const questions = [
            {
                text: "在社交场合中，你通常：",
                dimension: "EI",
                options: [
                    { text: "与很多人交谈，包括陌生人", value: "E" },
                    { text: "只与几个熟悉的人深入交流", value: "I" }
                ]
            },
            {
                text: "你更倾向于关注：",
                dimension: "SN",
                options: [
                    { text: "具体的细节和事实", value: "S" },
                    { text: "整体的大局和可能性", value: "N" }
                ]
            },
            {
                text: "做决定时，你更依赖：",
                dimension: "TF",
                options: [
                    { text: "逻辑分析，追求客观公正", value: "T" },
                    { text: "个人价值观和对他人的影响", value: "F" }
                ]
            },
            {
                text: "关于计划，你更倾向于：",
                dimension: "JP",
                options: [
                    { text: "提前做好详细计划", value: "J" },
                    { text: "保持灵活，随情况调整", value: "P" }
                ]
            },
            {
                text: "在聚会中，你通常感觉：",
                dimension: "EI",
                options: [
                    { text: "精力充沛，希望继续", value: "E" },
                    { text: "需要时间独处来恢复精力", value: "I" }
                ]
            }
        ];

        // ========== 状态变量 ==========
        let currentQuestion = 0;
        let answers = [];
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        // ========== 页面切换 ==========
        function showPage(pageId) {
            console.log('切换到页面:', pageId);
            const pages = document.querySelectorAll('.page');
            for (let i = 0; i < pages.length; i++) {
                pages[i].classList.remove('active');
            }
            const targetPage = document.getElementById(pageId);
            if (targetPage) {
                targetPage.classList.add('active');
                console.log('页面切换成功:', pageId);
            } else {
                console.error('未找到页面:', pageId);
            }
        }

        // ========== 开始测试 ==========
        function startTest() {
            console.log('startTest() 被调用');
            currentQuestion = 0;
            answers = [];
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            
            showPage('test-page');
            showQuestion();
            console.log('测试已开始，进入测试页');
        }

        // ========== 显示题目 ==========
        function showQuestion() {
            console.log('显示题目:', currentQuestion);
            const q = questions[currentQuestion];
            
            // 更新进度
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('question-counter').textContent = 
                `第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题`;
            
            // 显示题目
            document.getElementById('question-text').textContent = q.text;
            
            // 显示选项
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            for (let i = 0; i < q.options.length; i++) {
                const opt = q.options[i];
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt.text;
                div.onclick = (function(index) {
                    return function() {
                        selectOption(index);
                    };
                })(i);
                container.appendChild(div);
            }
            
            // 更新按钮状态
            document.getElementById('prev-btn').disabled = (currentQuestion === 0);
            document.getElementById('next-btn').textContent = 
                (currentQuestion === questions.length - 1) ? '完成测试' : '下一题';
            
            console.log('题目显示完成');
        }

        // ========== 选择选项 ==========
        function selectOption(index) {
            console.log('选择选项:', index);
            answers[currentQuestion] = index;
            
            // 更新UI
            const options = document.querySelectorAll('.option');
            for (let i = 0; i < options.length; i++) {
                options[i].classList.remove('selected');
            }
            options[index].classList.add('selected');
        }

        // ========== 上一题 ==========
        function prevQuestion() {
            console.log('上一题');
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // ========== 下一题 ==========
        function nextQuestion() {
            console.log('下一题，当前:', currentQuestion);
            if (answers[currentQuestion] === undefined) {
                alert('请先选择一个选项');
                return;
            }
            
            // 记录分数
            const q = questions[currentQuestion];
            const selectedValue = q.options[answers[currentQuestion]].value;
            scores[selectedValue]++;
            console.log('当前分数:', scores);
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResult();
            }
        }

        // ========== 显示结果 ==========
        function showResult() {
            console.log('显示结果');
            // 计算类型
            const type = 
                (scores.E > scores.I ? 'E' : 'I') +
                (scores.S > scores.N ? 'S' : 'N') +
                (scores.T > scores.F ? 'T' : 'F') +
                (scores.J > scores.P ? 'J' : 'P');
            
            document.getElementById('result-type').textContent = type;
            document.getElementById('result-description').innerHTML = `
                <h3>你的MBTI类型是：${type}</h3>
                <p>这是简化测试版（5道题），仅用于验证功能。</p>
                <p><strong>完整版将包含：</strong></p>
                <ul>
                    <li>93道专业题目</li>
                    <li>详细的维度分析</li>
                    <li>认知功能栈解读</li>
                    <li>职业和关系建议</li>
                    <li>历史记录和趋势图</li>
                </ul>
                <p style="margin-top: 15px;"><em>如果当前功能正常，我会立即添加完整内容。</em></p>
            `;
            
            showPage('result-page');
            console.log('结果显示完成，类型:', type);
        }

        // ========== 重新测试 ==========
        function restartTest() {
            console.log('重新测试');
            showPage('intro-page');
        }

        // ========== 查看历史 ==========
        function showHistory() {
            console.log('查看历史');
            document.getElementById('history-list').innerHTML = 
                '<p style="color: #999;">暂无历史记录</p>' +
                '<p style="color: #999; font-size: 0.9em; margin-top: 10px;">完成测试后，记录会自动保存</p>';
            showPage('history-page');
        }

        // ========== 初始化 ==========
        console.log('MBTI测试初始化完成');
        console.log('题目数量:', questions.length);
    </script>
</body>
</html>
