<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 人格测试</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 700px;
      width: 100%;
      padding: 40px;
    }
    h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
    .start-screen { text-align: center; }
    .btn-primary { 
      background: linear-gradient(135deg, #667eea, #764ba2); 
      color: white; border: none; padding: 15px 30px; 
      border-radius: 10px; font-size: 18px; cursor: pointer; 
      width: 100%; margin-top: 20px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; margin: 15px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.3s; }
    .question { font-size: 20px; margin: 20px 0; line-height: 1.6; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn { 
      padding: 15px 20px; border: 2px solid #e0e0e0; border-radius: 10px; 
      background: white; font-size: 16px; cursor: pointer; text-align: left;
      transition: all 0.2s;
    }
    .option-btn:hover { border-color: #667eea; background: #f0f0ff; }
    .option-btn.selected { border-color: #667eea; background: #eef0ff; }
    .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
    .result-box { text-align: center; }
    .dimension-score { margin: 15px 0; }
    .dimension-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>
  <script>
    // 10 道题的极简版
    const ALL_QUESTIONS = [
      { id: 1, dim: "EI", q: "在社交场合中，您通常：", a: "喜欢与人交流", b: "更喜欢独处" },
      { id: 2, dim: "EI", q: "周末您更喜欢：", a: "参加聚会活动", b: "在家休息" },
      { id: 3, dim: "SN", q: "您更关注：", a: "具体的事实和细节", b: "抽象的概念和可能性" },
      { id: 4, dim: "SN", q: "学习新东西时，您更喜欢：", a: "按部就班地学习", b: "凭直觉理解" },
      { id: 5, dim: "TF", q: "做决定时，您更依赖：", a: "逻辑分析", b: "个人感受" },
      { id: 6, dim: "TF", q: "看到朋友难过，您会：", a: "帮他想解决办法", b: "陪他一起难过" },
      { id: 7, dim: "JP", q: "您的生活态度是：", a: "提前计划好一切", b: "顺其自然" },
      { id: 8, dim: "JP", q: "您的桌子上通常是：", a: "整洁有序", b: "有点乱但我知道在哪" },
      { id: 9, dim: "EI", q: "您喜欢哪种沟通方式：", a: "说出来边想边说", b: "想好了再说" },
      { id: 10, dim: "SN", q: "您更喜欢：", a: "务实、脚踏实地", b: "天马行空地想象" }
    ];
    
    let questions = ALL_QUESTIONS;
    let current = -1;
    let answers = {};

    function render() {
      let app = document.getElementById('app');
      if (!app) { console.log('app not found!'); return; }
      
      let html = '';
      
      if (current === -1) {
        html = '<div class="start-screen">' +
          '<h1>MBTI 人格测试</h1>' +
          '<p>10道题快速了解你的性格倾向</p>' +
          '<button class="btn-primary" onclick="startTest()">开始测试</button>' +
          '</div>';
      } else if (current < questions.length) {
        let q = questions[current];
        let pct = ((current + 1) / questions.length * 100);
        html = '<div class="progress-info">第 ' + (current+1) + ' 题 / 共 ' + questions.length + ' 题</div>' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="question">' + (current+1) + '. ' + q.q + '</div>' +
          '<div class="options">' +
          '<button class="option-btn' + (answers[q.id] === q.dim[0] ? ' selected' : '') + '" onclick="selectAnswer(' + q.id + ',\'' + q.dim[0] + '\')">A. ' + q.a + '</button>' +
          '<button class="option-btn' + (answers[q.id] === q.dim[1] ? ' selected' : '') + '" onclick="selectAnswer(' + q.id + ',\'' + q.dim[1] + '\')">B. ' + q.b + '</button>' +
          '</div>' +
          '<div class="nav-buttons">' +
          (current > 0 ? '<button class="option-btn" onclick="prevQuestion()">上一题</button>' : '<div></div>') +
          '<button class="option-btn" onclick="nextQuestion()">' + (current < questions.length - 1 ? '下一题' : '查看结果') + '</button>' +
          '</div>';
      } else {
        // 计算结果
        let scores = { EI: 0, SN: 0, TF: 0, JP: 0, EI_t: 0, SN_t: 0, TF_t: 0, JP_t: 0 };
        for (let key in answers) {
          let ans = answers[key];
          let q = questions.find(q => q.id == key);
          if (q) {
            scores[q.dim]++;
            if (ans === q.dim[0]) scores[q.dim + '_t'] = (scores[q.dim + '_t'] || 0) + 1;
          }
        }
        let first = (scores.EI_t >= 1) ? 'E' : 'I';
        let second = (scores.SN_t >= 1) ? 'S' : 'N';
        let third = (scores.TF_t >= 1) ? 'T' : 'F';
        let fourth = (scores.JP_t >= 1) ? 'J' : 'P';
        let type = first + second + third + fourth;
        
        html = '<div class="result-box">' +
          '<h1>你的 MBTI 类型</h1>' +
          '<h2 style="font-size:64px;color:#667eea;margin:20px 0">' + type + '</h2>' +
          '<p>感谢完成测试！</p>' +
          '<button class="btn-primary" onclick="location.reload()">重新测试</button></div>';
      }
      
      app.innerHTML = html;
    }

    function startTest() { current = 0; answers = {}; render(); }
    function selectAnswer(id, val) { answers[id] = val; render(); }
    function nextQuestion() { if (current < questions.length - 1) { current++; render(); } else { current = questions.length; render(); } }
    function prevQuestion() { if (current > 0) { current--; render(); } }

    render();
  </script>
</body>
</html>
