<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>识己 · MBTI古韵人格</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0E8;
  --bg-warm:#FAF7F2;
  --card:#FFFFFF;
  --ink:#2D2D2D;
  --ink-light:#6B6B6B;
  --ink-muted:#9B9B9B;
  --accent:#C45C4A;
  --accent-soft:#E8D5D2;
  --gold:#B8A07A;
  --shadow:rgba(0,0,0,0.06);
  --shadow-soft:rgba(0,0,0,0.04);
}

html,body{
  min-height:100vh;
  min-height:100dvh; /* 动态视口高度，覆盖地址栏 */
  font-family:'Noto Serif SC','STSong','SimSun',serif;
  background:var(--bg);
  color:var(--ink);
  overflow:hidden;
  /* iPhone 刘海屏 */
  padding-top:env(safe-area-inset-top);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  /* 禁止双击缩放 */
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
}

/* ===== 页面容器 ===== */
.app{
  height:100%;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
  position:relative;
}

/* ===== 顶部标题区 ===== */
.header{
  text-align:center;
  padding:24px 20px 16px;
}
.app-title{
  font-size:13px;
  letter-spacing:8px;
  color:var(--ink-light);
  font-weight:500;
}

/* ===== 主内容区（可滚动） ===== */
.main{
  flex:1;
  overflow-y:auto;
  padding:0 20px 20px;
  -webkit-overflow-scrolling:touch;
}
.main::-webkit-scrollbar{display:none}

/* ===== 卡片 ===== */
.card{
  background:var(--card);
  border-radius:20px;
  box-shadow:0 4px 24px var(--shadow),0 1px 4px var(--shadow-soft);
  padding:28px;
  margin-bottom:16px;
  position:relative;
}

/* ===== 引导页 ===== */
.intro-card{
  text-align:center;
  padding:40px 28px;
}
.intro-step{
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:2px;
  margin-bottom:20px;
}
.intro-char{
  font-size:72px;
  font-weight:700;
  color:var(--ink);
  line-height:1;
  margin-bottom:8px;
  font-family:'Noto Serif SC',serif;
}
.intro-pinyin{
  font-size:14px;
  color:var(--ink-muted);
  letter-spacing:4px;
  font-family:'Cormorant Garamond',serif;
  margin-bottom:24px;
}
.intro-illust{
  width:120px;
  height:120px;
  margin:0 auto 24px;
  background:linear-gradient(135deg,var(--accent-soft) 0%,var(--bg-warm) 100%);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
}
.intro-poem{
  font-size:13px;
  color:var(--ink-light);
  line-height:2;
  letter-spacing:1px;
  margin-bottom:8px;
}
.intro-poem-vertical{
  writing-mode:vertical-rl;
  text-orientation:upright;
  height:80px;
  margin:0 auto;
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:4px;
}

/* ===== 开始按钮 ===== */
.start-btn{
  display:block;
  width:100%;
  margin-top:28px;
  padding:16px;
  background:var(--ink);
  color:var(--card);
  border:none;
  border-radius:12px;
  font-family:'Noto Serif SC',serif;
  font-size:15px;
  letter-spacing:6px;
  cursor:pointer;
  transition:all 0.3s ease;
}
.start-btn:hover{background:var(--accent);transform:translateY(-2px)}
.start-btn:active{transform:translateY(0)}

/* ===== 测试页 ===== */
.test-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.test-step{
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:2px;
}
.test-progress{
  display:flex;
  gap:6px;
}
.progress-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent-soft);
  transition:all 0.3s;
}
.progress-dot.active{background:var(--accent);transform:scale(1.2)}

.question-main{
  text-align:center;
  padding:20px 0;
}
.question-dim{
  font-size:11px;
  color:var(--accent);
  letter-spacing:3px;
  margin-bottom:16px;
}
.question-text{
  font-size:18px;
  line-height:1.8;
  color:var(--ink);
  font-weight:500;
}
.question-sub{
  font-size:12px;
  color:var(--ink-muted);
  margin-top:12px;
  letter-spacing:1px;
}

/* 选项 */
.options{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:8px;
}
.option{
  background:var(--bg-warm);
  border:1px solid transparent;
  border-radius:12px;
  padding:16px 20px;
  text-align:left;
  cursor:pointer;
  transition:all 0.25s ease;
  display:flex;
  align-items:center;
  gap:12px;
}
.option::before{
  content:'';
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent-soft);
  flex-shrink:0;
  transition:all 0.25s;
}
.option:hover{
  background:var(--card);
  border-color:var(--accent-soft);
  transform:translateX(4px);
}
.option:hover::before{background:var(--accent)}
.option.selected{
  background:var(--card);
  border-color:var(--accent);
}
.option.selected::before{
  background:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
}
.option-text{
  font-size:14px;
  line-height:1.6;
  color:var(--ink);
}

/* ===== 结果页 ===== */
.result-card{
  text-align:center;
  padding:32px 24px;
}
.result-type-tag{
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:3px;
  margin-bottom:16px;
}
.result-four{
  font-size:64px;
  font-weight:700;
  color:var(--ink);
  letter-spacing:8px;
  line-height:1;
  margin-bottom:8px;
}
.result-pinyin{
  font-size:13px;
  color:var(--ink-muted);
  letter-spacing:6px;
  font-family:'Cormorant Garamond',serif;
  margin-bottom:20px;
}
.result-figure{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:20px;
}
.result-avatar{
  width:48px;
  height:48px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent-soft),var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
.result-figure-name{
  font-size:16px;
  font-weight:600;
  color:var(--ink);
  letter-spacing:4px;
}
.result-poem{
  font-size:13px;
  color:var(--ink-light);
  font-style:italic;
  line-height:1.8;
  margin-bottom:20px;
  padding:0 20px;
}

/* 四维 */
.dims-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:20px 0;
}
.dim-item{
  background:var(--bg-warm);
  border-radius:12px;
  padding:14px;
  text-align:center;
}
.dim-label{
  font-size:10px;
  color:var(--ink-muted);
  letter-spacing:2px;
  margin-bottom:6px;
}
.dim-value{
  font-size:14px;
  color:var(--ink);
  font-weight:500;
}
.dim-bar{
  height:3px;
  background:var(--accent-soft);
  border-radius:2px;
  margin-top:8px;
  overflow:hidden;
}
.dim-bar-fill{
  height:100%;
  background:var(--accent);
  border-radius:2px;
}

/* ===== 详情 ===== */
.detail-section{
  text-align:left;
  margin-bottom:16px;
}
.detail-section:last-child{margin-bottom:0}
.detail-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:var(--accent);
  letter-spacing:3px;
  margin-bottom:8px;
}
.detail-title::before{
  content:'';
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent);
}
.detail-text{
  font-size:clamp(12px,3.5vw,13px);
  color:var(--ink-light);
  line-height:1.8;
  padding-left:14px;
  border-left:1px solid var(--accent-soft);
}

/* ===== 按钮组 ===== */
.result-actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}
.result-btn{
  flex:1;
  padding:clamp(12px,3.5vw,14px);
  background:var(--bg-warm);
  border:1px solid transparent;
  border-radius:10px;
  font-family:'Noto Serif SC',serif;
  font-size:clamp(12px,3.5vw,13px);
  color:var(--ink);
  letter-spacing:2px;
  cursor:pointer;
  transition:all 0.3s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.result-btn:active{transform:scale(0.97)}
@media(hover:hover){
  .result-btn:hover{background:var(--card);border-color:var(--accent-soft)}
}
.result-btn.primary{background:var(--ink);color:var(--card)}
.result-btn.primary:hover{background:var(--accent)}

/* ===== 雷达图 ===== */
.radar-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:24px 0 16px;
  padding:10px;
  background:rgba(255,255,255,0.3);
  border-radius:16px;
  border:1px solid rgba(196,92,74,0.12);
}
.radar-svg{
  width:100%;
  max-width:240px;
  height:auto;
  display:block;
}
.radar-grid{
  stroke:var(--ink-muted);
  stroke-width:0.5;
  stroke-opacity:0.3;
  stroke-dasharray:2 2;
}
.radar-axis{
  stroke:var(--ink-muted);
  stroke-width:0.5;
  stroke-opacity:0.4;
}
.radar-shape{
  fill:rgba(196,92,74,0.18);
  stroke:var(--accent);
  stroke-width:1.5;
  stroke-linejoin:round;
  animation:radar-draw 1.2s ease-out forwards;
  transform-origin:110px 110px;
  stroke-dasharray:600;
  stroke-dashoffset:600;
}
@keyframes radar-draw{
  to{stroke-dashoffset:0;fill-opacity:1}
}
.radar-label{
  font-family:serif;
  font-size:9px;
  fill:var(--ink-light);
  letter-spacing:1px;
}
.radar-pct{
  font-family:serif;
  font-size:11px;
  fill:var(--accent);
  font-weight:bold;
  letter-spacing:0.5px;
}

/* ===== 区块标题 ===== */
.section-title{
  text-align:center;
  font-family:serif;
  font-size:14px;
  color:var(--ink);
  letter-spacing:6px;
  margin:28px 0 12px;
  font-weight:normal;
}
.section-content{
  font-family:serif;
  font-size:14px;
  line-height:1.95;
  color:var(--ink-light);
  text-align:left;
  letter-spacing:1.2px;
  text-indent:2em;
  padding:0 4px;
}
.essence{
  font-style:italic;
  text-align:left;
}

/* ===== 双列天赋/成长 ===== */
.dual-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:8px;
}
.dual-item{
  background:rgba(255,255,255,0.35);
  border:1px solid rgba(196,92,74,0.15);
  border-radius:12px;
  padding:14px 12px;
}
.dual-label{
  font-family:serif;
  font-size:12px;
  color:var(--ink);
  letter-spacing:3px;
  margin-bottom:10px;
  text-align:center;
}
.dual-list{display:flex;flex-direction:column;gap:6px}
.dual-line{
  font-family:serif;
  font-size:12px;
  color:var(--ink-light);
  line-height:1.6;
  letter-spacing:0.5px;
}

/* ===== 诗单 ===== */
.poem-list-title{
  font-family:serif;
  font-size:14px;
  color:var(--ink);
  letter-spacing:6px;
  text-align:center;
  margin:28px 0 12px;
  font-weight:normal;
}
.poem-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.poem-card{
  background:rgba(255,255,255,0.4);
  border-left:3px solid var(--accent);
  border-radius:8px;
  padding:12px 14px;
}
.poem-card-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:6px;
  padding-bottom:6px;
  border-bottom:1px dashed rgba(196,92,74,0.15);
}
.poem-card-title{
  font-family:serif;
  font-size:13px;
  color:var(--ink);
  font-weight:bold;
  letter-spacing:2px;
}
.poem-card-author{
  font-family:serif;
  font-size:11px;
  color:var(--ink-muted);
  letter-spacing:1px;
}
.poem-card-body{
  font-family:serif;
  font-size:13px;
  color:var(--ink-light);
  line-height:1.8;
  letter-spacing:1.5px;
}

/* ===== 同类古人 ===== */
.figures-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:8px;
}
.figure-card{
  background:rgba(255,255,255,0.35);
  border:1px solid rgba(196,92,74,0.12);
  border-radius:12px;
  padding:12px 10px;
  text-align:center;
}
.figure-avatar{
  width:36px;height:36px;
  border-radius:50%;
  background:var(--ink);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:serif;
  font-size:16px;
  margin:0 auto 8px;
  letter-spacing:0;
}
.figure-name{
  font-family:serif;
  font-size:13px;
  color:var(--ink);
  font-weight:bold;
  letter-spacing:2px;
  margin-bottom:4px;
}
.figure-desc{
  font-family:serif;
  font-size:11px;
  color:var(--ink-muted);
  line-height:1.5;
  letter-spacing:0.5px;
}

/* ===== 关系匹配 ===== */
.match-wrap{margin-top:8px}
.match-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.match-col{
  background:rgba(255,255,255,0.4);
  border:1px solid rgba(196,92,74,0.15);
  border-radius:12px;
  padding:14px 12px;
}
.match-col.good{border-color:rgba(122,139,108,0.3)}
.match-tag{
  font-family:serif;
  font-size:12px;
  color:var(--ink);
  letter-spacing:3px;
  text-align:center;
  margin-bottom:10px;
}
.match-types{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:10px;
}
.match-type{
  display:block;
  font-family:serif;
  font-size:12px;
  color:var(--ink-light);
  background:rgba(196,92,74,0.08);
  padding:6px 8px;
  border-radius:6px;
  letter-spacing:1px;
  text-align:center;
  cursor:pointer;
  transition:all 0.2s;
}
.match-type:active{background:var(--accent);color:#fff}
.match-desc{
  font-family:serif;
  font-size:11px;
  color:var(--ink-muted);
  line-height:1.6;
  text-align:center;
  letter-spacing:0.5px;
}

/* ===== 静夜思 ===== */
.flaw-box{
  font-family:serif;
  text-align:center;
  font-size:13px;
  color:var(--ink);
  letter-spacing:3px;
  margin:32px 0 20px;
  padding:20px 16px;
  background:rgba(196,92,74,0.04);
  border-top:1px solid var(--accent-soft);
  border-bottom:1px solid var(--accent-soft);
  line-height:1.8;
}
.flaw-box span{
  display:block;
  font-size:13px;
  color:var(--ink-light);
  margin-top:10px;
  letter-spacing:1px;
  line-height:2;
  font-weight:normal;
}

/* ===== 底部导航 ===== */
.nav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:32px;
  padding:16px 20px 24px;
  background:var(--bg);
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  cursor:pointer;
  opacity:0.4;
  transition:all 0.3s;
}
.nav-item.active{opacity:1}
.nav-item:hover{opacity:0.8}
.nav-char{
  font-size:16px;
  color:var(--ink);
  font-weight:500;
}
.nav-dot{
  width:4px;
  height:4px;
  border-radius:50%;
  background:var(--accent);
  opacity:0;
  transition:all 0.3s;
}
.nav-item.active .nav-dot{opacity:1}
.nav-label{
  font-size:9px;
  color:var(--ink-muted);
  letter-spacing:1px;
}

/* ===== 历史页 ===== */
.history-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.history-item{
  background:var(--card);
  border-radius:16px;
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition:all 0.3s;
  box-shadow:0 2px 8px var(--shadow-soft);
}
.history-item:hover{transform:translateY(-2px);box-shadow:0 4px 16px var(--shadow)}
.history-left{display:flex;align-items:center;gap:16px}
.history-type{
  font-size:20px;
  font-weight:600;
  color:var(--ink);
  font-family:'Cormorant Garamond',serif;
}
.history-name{
  font-size:13px;
  color:var(--ink-light);
  letter-spacing:2px;
}
.history-date{
  font-size:11px;
  color:var(--ink-muted);
}

/* ===== 分享弹窗 ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  padding:env(safe-area-inset-top,20px) env(safe-area-inset-right,20px) env(safe-area-inset-bottom,20px) env(safe-area-inset-left,20px);
  z-index:100;
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
}
.modal.active{display:flex}
.modal-card{
  background:var(--card);
  border-radius:20px;
  padding:clamp(20px,6vw,28px);
  max-width:clamp(280px,85vw,320px);
  width:100%;
  text-align:center;
}
.modal-title{
  font-size:16px;
  color:var(--ink);
  letter-spacing:4px;
  margin-bottom:16px;
}
.modal-text{
  font-size:13px;
  color:var(--ink-light);
  line-height:2;
  margin-bottom:20px;
}
.modal-close{
  padding:12px 32px;
  background:var(--bg-warm);
  border:none;
  border-radius:10px;
  font-family:'Noto Serif SC',serif;
  font-size:13px;
  color:var(--ink);
  cursor:pointer;
}

/* ===== 页面切换 ===== */
.page{display:none;opacity:0}
.page.active{
  display:block;
  animation:pageIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes pageIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== 卡片交错入场 ===== */
.card{
  opacity:0;
  transform:translateY(20px);
}
.card.anim-in{
  animation:cardIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== 引导页大字呼吸动画 ===== */
.intro-char{
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.04);opacity:0.9}
}

/* ===== 引导页装饰圆呼吸 ===== */
.intro-illust{
  animation:floatIn 0.8s cubic-bezier(0.22,1,0.36,1) forwards, float 4s ease-in-out 0.8s infinite;
}
@keyframes floatIn{
  from{opacity:0;transform:scale(0.7)}
  to{opacity:1;transform:scale(1)}
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* ===== 按钮呼吸提示 ===== */
.start-btn{
  animation:btnPulse 2.5s ease-in-out infinite;
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 4px 16px rgba(45,45,45,0.15)}
  50%{box-shadow:0 4px 28px rgba(196,92,74,0.3)}
}

/* ===== 选项涟漪效果 ===== */
.option{
  position:relative;
  overflow:hidden;
}
.option::after{
  content:'';
  position:absolute;
  inset:0;
  background:var(--accent);
  opacity:0;
  transform:scale(0);
  border-radius:12px;
  transition:transform 0.4s,opacity 0.4s;
}
.option.ripple::after{
  animation:ripple 0.5s ease-out;
}
@keyframes ripple{
  0%{transform:scale(0);opacity:0.3}
  100%{transform:scale(1.5);opacity:0}
}

/* ===== 选项选中 ===== */
.option.selected{
  background:var(--card);
  border-color:var(--accent);
  animation:selBounce 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes selBounce{
  0%{transform:scale(1)}
  50%{transform:scale(1.03)}
  100%{transform:scale(1)}
}

/* ===== 进度条平滑 ===== */
.dim-bar-fill{
  transition:width 0.6s cubic-bezier(0.22,1,0.36,1) !important;
}

/* ===== 结果页揭示 ===== */
.result-reveal{
  opacity:0;
  transform:translateY(12px);
}
.result-reveal.do{
  animation:resultIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes resultIn{
  to{opacity:1;transform:translateY(0)}
}

/* ===== 四字人格放大揭示 ===== */
.result-four{
  animation:charReveal 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes charReveal{
  0%{opacity:0;transform:scale(0.7)}
  60%{transform:scale(1.05)}
  100%{opacity:1;transform:scale(1)}
}

/* ===== 历史项悬浮 ===== */
.history-item{
  transition:transform 0.25s cubic-bezier(0.22,1,0.36,1),
              box-shadow 0.25s cubic-bezier(0.22,1,0.36,1),
              background 0.25s;
}
@media(hover:hover){
  .history-item:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 24px var(--shadow);
    background:#FFFEF9;
  }
}
.history-item:active{transform:scale(0.98)}

/* ===== 恢复卡片滑入 ===== */
#resume-card{
  animation:slideUp 0.4s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== 导航项切换动画 ===== */
.nav-item{
  position:relative;
}
.nav-item::before{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  background:var(--accent-soft);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width 0.3s,height 0.3s;
  z-index:-1;
}
.nav-item:active::before{
  width:40px;
  height:40px;
}

/* ===== 空状态 ===== */
.empty-state{
  text-align:center;
  padding:clamp(40px,12vw,60px) 20px;
  color:var(--ink-muted);
}
.empty-icon{

.empty-text{

/* ===== 平板/桌面适配 ===== */

// ==================== 状态 ====================
let curQ=0,answers=[],scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},history=[];
const PROGRESS_KEY='mbti-progress-v2';
const EXPIRE_MS=7*24*60*60*1000; // 7天过期

// ==================== 初始化 ====================
window.onload=function(){
  loadData();
  initProgressDots();
  checkResume();
  requestAnimationFrame(()=>{
    document.querySelectorAll('.page.active .card').forEach((card,i)=>{
      card.style.animationDelay=i*0.08+'s';
      card.classList.add('anim-in');
    });
  });
  // 离开页面时自动保存进度
  window.addEventListener('beforeunload',()=>{
    if(answers.length>0&&answers.length<questions.length){
      try{saveProgress();}catch(e){}
    }
  });
};

function loadData(){
  try{
    const h=localStorage.getItem('mbti-history');
    if(h)history=JSON.parse(h);
  }catch(e){history=[];}
}

function checkResume(){
  try{
    const raw=localStorage.getItem(PROGRESS_KEY);
    if(!raw)return;
    const p=JSON.parse(raw);
    // 过期检查
    if(Date.now()-p.savedAt>EXPIRE_MS){
      localStorage.removeItem(PROGRESS_KEY);
      return;
    }
    // 有效进度
    if(p.answers&&p.answers.length>0&&p.answers.length<questions.length){
      document.getElementById('resume-card').style.display='block';
      document.getElementById('resume-count').textContent=p.answers.length;
      window._savedProgress=p;
    }
  }catch(e){console.error(e);}
}

function resumeTest(){
  const p=window._savedProgress;
  if(!p)return;
  curQ=p.curQ;
  answers=p.answers;
  scores=p.scores;
  // 如果恢复的 curQ 对应的题已作答过（说明保存的是已答题目的索引），自动跳到下一题
  while(curQ<questions.length&&answers.find(a=>a.q===curQ)){
    curQ++;
  }
  if(curQ>=questions.length){
    clearProgress();
    showResult();
    return;
  }
  showQuestion();
  showPage('test');
}

function saveProgress(){
  try{
    const data={curQ,answers,scores,savedAt:Date.now()};
    localStorage.setItem(PROGRESS_KEY,JSON.stringify(data));
  }catch(e){console.error(e);}
}

function clearProgress(){
  try{localStorage.removeItem(PROGRESS_KEY);}catch(e){}
  curQ=0;answers=[];scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
}

function pauseTest(){
  saveProgress();
  // 提示用户已保存
  const btn=document.querySelector('.start-btn');
  // 简单提示
  if(confirm('进度已保存，下次进来会自动询问是否继续。\n\n确定要退出吗？')){
    clearProgress();
    showPage('intro');
  }
}

function saveHistory(type){
  const now=new Date();
  history.unshift({type,date:now.toLocaleDateString('zh-CN'),time:now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  if(history.length>20)history=history.slice(0,20);
  try{localStorage.setItem('mbti-history',JSON.stringify(history));}catch(e){}
}

// ==================== 页面切换 ====================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const pg=document.getElementById('page-'+name);
  pg.classList.add('active');
  document.querySelector('.nav-item[data-page="'+name+'"]')?.classList.add('active');
  // 触发卡片入场动画
  requestAnimationFrame(()=>{
    pg.querySelectorAll('.card').forEach((card,i)=>{
      card.classList.remove('anim-in');
      void card.offsetWidth; // reflow 触发重绘
      card.style.animationDelay=i*0.08+'s';
      card.classList.add('anim-in');
    });
  });
}

// ==================== 测试逻辑 ====================
function initProgressDots(){
  const wrap=document.getElementById('test-progress');
  wrap.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='progress-dot'+(i===0?' active':'');
    wrap.appendChild(d);
  }
}

function updateProgress(){
  const pct=Math.floor((curQ/questions.length)*5);
  document.querySelectorAll('.progress-dot').forEach((d,i)=>{
    d.classList.toggle('active',i<=pct);
  });
  document.getElementById('test-step').textContent=(curQ+1)+' / '+questions.length;
}

function startTest(){
  // 如果有保存的进度，让用户选择恢复或重开
  if(window._savedProgress){
    if(!confirm('检测到未完成的测试（第 '+(window._savedProgress.answers.length+1)+' 题）。\n\n确定要重新开始吗？\n点击「取消」继续上次的测试。')){
      resumeTest();
      return;
    }
  }
  clearProgress();
  curQ=0;answers=[];scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  showQuestion();
  showPage('test');
}

function showQuestion(){
  const q=questions[curQ];
  document.getElementById('question-dim').textContent=dimInfo[q.dim].name;
  document.getElementById('question-text').textContent=q.text;
  document.getElementById('question-sub').textContent='「'+dimInfo[q.dim].labels[0]+' ←→ '+dimInfo[q.dim].labels[1]+'」';
  
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const d=document.createElement('div');
    d.className='option';
    d.style.opacity='0';
    d.style.transform='translateY(10px)';
    d.innerHTML='<div class="option-text">'+opt+'</div>';
    d.onclick=()=>selectOption(i,q.dim);
    opts.appendChild(d);
    setTimeout(()=>{
      d.style.transition='opacity 0.3s ease,transform 0.3s ease';
      d.style.opacity='1';
      d.style.transform='translateY(0)';
    },80+i*60);
  });
  // 如果是恢复的进度，且该题已作答过，显示选中状态
  const prev=answers.find(a=>a.q===curQ);
  if(prev){
    document.querySelectorAll('.option').forEach((el,i)=>el.classList.toggle('selected',i===prev.choice));
  }
  // 上一题按钮状态
  const prevBtn=document.getElementById('btn-prev');
  if(curQ===0){
    prevBtn.style.opacity='0.3';
    prevBtn.style.cursor='not-allowed';
  }else{
    prevBtn.style.opacity='0.7';
    prevBtn.style.cursor='pointer';
  }
  updateProgress();
  // 每次翻题都保存进度，防止用户未作答就退出
  saveProgress();
}

function prevQuestion(){
  if(curQ===0)return;
  // 回退：弹出一条已答的记录，扣分
  const last=answers.pop();
  if(last){
    const q=questions[last.q];
    const first=q.dim[0],second=q.dim[1];
    if(last.choice===0)scores[first]--;else scores[second]--;
  }
  curQ--;
  saveProgress();
  showQuestion();
}

function selectOption(idx,dim){
  const opts=document.querySelectorAll('.option');
  opts.forEach(el=>el.classList.remove('ripple'));
  opts[idx].classList.add('ripple','selected');
  setTimeout(()=>opts[idx].classList.remove('ripple'),500);
  answers.push({q:curQ,choice:idx});
  const first=dim[0],second=dim[1];
  if(idx===0)scores[first]++;else scores[second]++;
  curQ++;
  saveProgress();
  setTimeout(()=>{
    if(curQ<questions.length){
      showQuestion();
    }else{
      clearProgress();
      showResult();
    }
  },300);
}

function calcType(){
  return (scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
}

let curType='';

// ==================== 结果页 ====================
function showResult(){
  const type=calcType();
  curType=type;
  saveHistory(type);
  clearProgress(); // 清进度
  renderResult(type);
  showPage('result');
}

function renderResult(type){
  const db=poeticDB[type];
  const dims=[
    {code:'EI',label:'外向',opp:'内向',val:scores.E,oppVal:scores.I,pct:Math.round(scores.E/(scores.E+scores.I)*100)},
    {code:'SN',label:'实感',opp:'直觉',val:scores.S,oppVal:scores.N,pct:Math.round(scores.S/(scores.S+scores.N)*100)},
    {code:'TF',label:'思考',opp:'情感',val:scores.T,oppVal:scores.F,pct:Math.round(scores.T/(scores.T+scores.F)*100)},
    {code:'JP',label:'判断',opp:'知觉',val:scores.J,oppVal:scores.P,pct:Math.round(scores.J/(scores.J+scores.P)*100)}
  ];
  
  // 生成 4 维雷达图 SVG
  function buildRadar(){
    const cx=110,cy=110,R=85;
    const points=dims.map((d,i)=>{
      const angle=-Math.PI/2 + i*Math.PI/2;
      const r=R*(d.pct/100);
      return [cx+r*Math.cos(angle),cy+r*Math.sin(angle)];
    });
    const poly=points.map(p=>p.join(',')).join(' ');
    const gridLevels=[0.25,0.5,0.75,1];
    const axes=dims.map((d,i)=>{
      const angle=-Math.PI/2 + i*Math.PI/2;
      return {
        x1:cx,y1:cy,
        x2:cx+R*Math.cos(angle),y2:cy+R*Math.sin(angle),
        lx:cx+(R+18)*Math.cos(angle),ly:cy+(R+18)*Math.sin(angle),
        label:d.label+'\n'+d.opp,
        pct:d.pct
      };
    });
    return `
      <svg viewBox="0 0 220 220" class="radar-svg">
        ${gridLevels.map(lv=>{
          const pts=axes.map(a=>{
            const r=R*lv;
            return (cx+r*Math.cos(-Math.PI/2+axes.indexOf(a)*Math.PI/2))+','+
                   (cy+r*Math.sin(-Math.PI/2+axes.indexOf(a)*Math.PI/2));
          }).join(' ');
          return `<polygon points="${pts}" class="radar-grid" fill="none"/>`;
        }).join('')}
        ${axes.map(a=>`<line x1="${a.x1}" y1="${a.y1}" x2="${a.x2}" y2="${a.y2}" class="radar-axis"/>`).join('')}
        <polygon points="${poly}" class="radar-shape" style="--final-poly:${poly}"/>
        ${axes.map((a,i)=>{
          const ta=i===0?'middle':i===2?'middle':(a.lx<cx?'end':'start');
          return `<text x="${a.lx}" y="${a.ly}" class="radar-label" text-anchor="${ta}">${a.label}</text>`;
        }).join('')}
        ${axes.map((a,i)=>{
          const ta=i===0?'middle':i===2?'middle':(a.lx<cx?'end':'start');
          return `<text x="${a.lx}" y="${a.ly+12}" class="radar-pct" text-anchor="${ta}">${a.pct}%</text>`;
        }).join('')}
      </svg>
    `;
  }
  
  document.getElementById('result-card').innerHTML=`
    <div class="result-reveal" style="animation-delay:0s">
      <div class="result-type-tag">${type} · ${db.name}</div>
    </div>
    <div class="result-reveal" style="animation-delay:0.1s">
      <div class="result-four">${db.four}</div>
    </div>
    <div class="result-reveal" style="animation-delay:0.2s">
      <div class="result-pinyin">${db.pinyin}</div>
    </div>
    <div class="result-reveal" style="animation-delay:0.3s">
      <div class="result-figure">
        <div class="result-avatar">${db.figure.charAt(0)}</div>
        <div class="result-figure-name">${db.figure}</div>
        <div class="result-figure-desc">${db.desc}</div>
      </div>
    </div>
    <div class="result-reveal" style="animation-delay:0.4s">
      <div class="result-poem">${db.poem}</div>
    </div>
    
    <div class="result-reveal" style="animation-delay:0.5s">
      <div class="radar-wrap">${buildRadar()}</div>
    </div>
    
    <div class="result-reveal" style="animation-delay:0.6s">
      <div class="section-title">「 性格底色 」</div>
      <div class="section-content essence">${db.essence}</div>
    </div>
    
    <div class="result-reveal" style="animation-delay:0.7s">
      <div class="dual-grid">
        <div class="dual-item">
          <div class="dual-label">「 天赋之能 」</div>
          <div class="dual-list">${db.talent.map(t=>`<div class="dual-line">· ${t}</div>`).join('')}</div>
        </div>
        <div class="dual-item">
          <div class="dual-label" style="color:var(--accent)">「 成长之阶 」</div>
          <div class="dual-list">${db.growth.map(t=>`<div class="dual-line">· ${t}</div>`).join('')}</div>
        </div>
      </div>
    </div>
    
    <div class="result-reveal" style="animation-delay:0.8s">
      <div class="section-title">「 人际风向 」</div>
      <div class="section-content">${db.social}</div>
    </div>
    
    <div class="result-reveal" style="animation-delay:0.85s">
      <div class="section-title">「 适配之境 」</div>
      <div class="section-content">${db.career}</div>
    </div>
    
    <div class="result-reveal" style="animation-delay:0.9s">
      <div class="poem-list-title">「 推荐诗单 」</div>
      <div class="poem-list">
        ${db.poems.map(p=>`
          <div class="poem-card">
            <div class="poem-card-head">
              <span class="poem-card-title">${p.t}</span>
              <span class="poem-card-author">${p.a}</span>
            </div>
            <div class="poem-card-body">${p.p}</div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <div class="result-reveal" style="animation-delay:1.0s">
      <div class="section-title">「 同类古人 」</div>
      <div class="figures-grid">
        ${db.figures.map(f=>`
          <div class="figure-card">
            <div class="figure-avatar">${f.n.charAt(0)}</div>
            <div class="figure-name">${f.n}</div>
            <div class="figure-desc">${f.d}</div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <div class="result-reveal" style="animation-delay:1.1s">
      <div class="match-wrap">
        <div class="match-row">
          <div class="match-col good">
            <div class="match-tag">「 心有灵犀 」</div>
            <div class="match-types">${db.best.map(t=>`<span class="match-type" onclick="rerenderResult('${t}')">${t} · ${poeticDB[t]?.four||''}</span>`).join('')}</div>
            <div class="match-desc">与此类人相处，你感到被理解、被看见。</div>
          </div>
          <div class="match-col bad">
            <div class="match-tag" style="color:var(--accent)">「 擦出火花 」</div>
            <div class="match-types">${db.worst.map(t=>`<span class="match-type" onclick="rerenderResult('${t}')">${t} · ${poeticDB[t]?.four||''}</span>`).join('')}</div>
            <div class="match-desc">与此类人相处，需要更多耐心与倾听。</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="result-reveal" style="animation-delay:1.2s">
      <div class="flaw-box">「 静夜思 」<br><span>${db.flaw}</span></div>
    </div>
    
    <div class="result-reveal" style="animation-delay:1.3s">
      <div class="result-actions">
        <button class="result-btn" onclick="showHistory()">历史</button>
        <button class="result-btn" onclick="restartFresh()">重测</button>
        <button class="result-btn primary" onclick="openShare()">分享结果</button>
      </div>
    </div>
  `;
  // 触发所有揭示动画
  requestAnimationFrame(()=>{
    document.querySelectorAll('.result-reveal').forEach(el=>el.classList.add('do'));
  });
}

// ==================== 历史页 ====================
function showHistory(){
  const list=document.getElementById('history-list');
  if(history.length===0){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-text">暂无记录</div></div>';
  }else{
    list.innerHTML=history.map(h=>`
      <div class="history-item" onclick="rerenderResult('${h.type}')">
        <div class="history-left">
          <div class="history-type">${h.type}</div>
          <div class="history-name">${poeticDB[h.type]?.four||''}</div>
        </div>
        <div class="history-date">${h.date}</div>
      </div>
    `).join('');
  }
  showPage('history');
}

function rerenderResult(type){
  curType=type;
  renderResult(type);
  showPage('result');
}

// ==================== 弹窗 ====================
function closeModal(){
  document.getElementById('modal-share').classList.remove('active');
}

function restartFresh(){
  if(confirm('重新测试？当前进度将被清除。')){
    try{localStorage.removeItem(PROGRESS_KEY);}catch(e){}
    startTest();
  }
}

function openShare(){
  const type=curType||'INTJ';
  const db=poeticDB[type];
  const text=`我在《识己·知人》测出自己是【${db.four}】·${type}（${db.name}）
${db.poem}
—— 与我最同频的是 ${db.best.join('、')}
测一下你是哪种人格：https://nc0319.github.io/mbti-test/`;
  if(navigator.share){
    navigator.share({title:'识己·知人',text:text}).catch(()=>copyShare(text));
  }else{
    copyShare(text);
  }
}

function copyShare(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>alert('结果已复制，去分享给朋友吧'));
  }else{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');alert('结果已复制，去分享给朋友吧');}catch(e){}
    document.body.removeChild(ta);
  }
}

// ==================== 暴露 ====================
window.startTest=startTest;
window.showPage=showPage;
window.showHistory=showHistory;
window.closeModal=closeModal;
window.rerenderResult=rerenderResult;
window.resumeTest=resumeTest;
window.pauseTest=pauseTest;
window.discardProgress=discardProgress;
window.prevQuestion=prevQuestion;
</script>
