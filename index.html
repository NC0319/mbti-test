<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>识己 · MBTI古韵人格</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F0E8;
  --bg-warm:#FAF7F2;
  --card:#FFFFFF;
  --ink:#2D2D2D;
  --ink-light:#6B6B6B;
  --ink-muted:#9B9B9B;
  --accent:#C45C4A;
  --accent-soft:#E8D5D2;
  --gold:#B8A07A;
  --shadow:rgba(0,0,0,0.06);
  --shadow-soft:rgba(0,0,0,0.04);
}

html,body{
  height:100%;
  font-family:'Noto Serif SC','STSong','SimSun',serif;
  background:var(--bg);
  color:var(--ink);
  overflow:hidden;
}

/* ===== 页面容器 ===== */
.app{
  height:100%;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
  position:relative;
}

/* ===== 顶部标题区 ===== */
.header{
  text-align:center;
  padding:24px 20px 16px;
}
.app-title{
  font-size:13px;
  letter-spacing:8px;
  color:var(--ink-light);
  font-weight:500;
}

/* ===== 主内容区（可滚动） ===== */
.main{
  flex:1;
  overflow-y:auto;
  padding:0 20px 20px;
  -webkit-overflow-scrolling:touch;
}
.main::-webkit-scrollbar{display:none}

/* ===== 卡片 ===== */
.card{
  background:var(--card);
  border-radius:20px;
  box-shadow:0 4px 24px var(--shadow),0 1px 4px var(--shadow-soft);
  padding:28px;
  margin-bottom:16px;
  position:relative;
}

/* ===== 引导页 ===== */
.intro-card{
  text-align:center;
  padding:40px 28px;
}
.intro-step{
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:2px;
  margin-bottom:20px;
}
.intro-char{
  font-size:72px;
  font-weight:700;
  color:var(--ink);
  line-height:1;
  margin-bottom:8px;
  font-family:'Noto Serif SC',serif;
}
.intro-pinyin{
  font-size:14px;
  color:var(--ink-muted);
  letter-spacing:4px;
  font-family:'Cormorant Garamond',serif;
  margin-bottom:24px;
}
.intro-illust{
  width:120px;
  height:120px;
  margin:0 auto 24px;
  background:linear-gradient(135deg,var(--accent-soft) 0%,var(--bg-warm) 100%);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
}
.intro-poem{
  font-size:13px;
  color:var(--ink-light);
  line-height:2;
  letter-spacing:1px;
  margin-bottom:8px;
}
.intro-poem-vertical{
  writing-mode:vertical-rl;
  text-orientation:upright;
  height:80px;
  margin:0 auto;
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:4px;
}

/* ===== 开始按钮 ===== */
.start-btn{
  display:block;
  width:100%;
  margin-top:28px;
  padding:16px;
  background:var(--ink);
  color:var(--card);
  border:none;
  border-radius:12px;
  font-family:'Noto Serif SC',serif;
  font-size:15px;
  letter-spacing:6px;
  cursor:pointer;
  transition:all 0.3s ease;
}
.start-btn:hover{background:var(--accent);transform:translateY(-2px)}
.start-btn:active{transform:translateY(0)}

/* ===== 测试页 ===== */
.test-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.test-step{
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:2px;
}
.test-progress{
  display:flex;
  gap:6px;
}
.progress-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent-soft);
  transition:all 0.3s;
}
.progress-dot.active{background:var(--accent);transform:scale(1.2)}

.question-main{
  text-align:center;
  padding:20px 0;
}
.question-dim{
  font-size:11px;
  color:var(--accent);
  letter-spacing:3px;
  margin-bottom:16px;
}
.question-text{
  font-size:18px;
  line-height:1.8;
  color:var(--ink);
  font-weight:500;
}
.question-sub{
  font-size:12px;
  color:var(--ink-muted);
  margin-top:12px;
  letter-spacing:1px;
}

/* 选项 */
.options{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:8px;
}
.option{
  background:var(--bg-warm);
  border:1px solid transparent;
  border-radius:12px;
  padding:16px 20px;
  text-align:left;
  cursor:pointer;
  transition:all 0.25s ease;
  display:flex;
  align-items:center;
  gap:12px;
}
.option::before{
  content:'';
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent-soft);
  flex-shrink:0;
  transition:all 0.25s;
}
.option:hover{
  background:var(--card);
  border-color:var(--accent-soft);
  transform:translateX(4px);
}
.option:hover::before{background:var(--accent)}
.option.selected{
  background:var(--card);
  border-color:var(--accent);
}
.option.selected::before{
  background:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
}
.option-text{
  font-size:14px;
  line-height:1.6;
  color:var(--ink);
}

/* ===== 结果页 ===== */
.result-card{
  text-align:center;
  padding:32px 24px;
}
.result-type-tag{
  font-size:12px;
  color:var(--ink-muted);
  letter-spacing:3px;
  margin-bottom:16px;
}
.result-four{
  font-size:64px;
  font-weight:700;
  color:var(--ink);
  letter-spacing:8px;
  line-height:1;
  margin-bottom:8px;
}
.result-pinyin{
  font-size:13px;
  color:var(--ink-muted);
  letter-spacing:6px;
  font-family:'Cormorant Garamond',serif;
  margin-bottom:20px;
}
.result-figure{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:20px;
}
.result-avatar{
  width:48px;
  height:48px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent-soft),var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
.result-figure-name{
  font-size:16px;
  font-weight:600;
  color:var(--ink);
  letter-spacing:4px;
}
.result-poem{
  font-size:13px;
  color:var(--ink-light);
  font-style:italic;
  line-height:1.8;
  margin-bottom:20px;
  padding:0 20px;
}

/* 四维 */
.dims-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:20px 0;
}
.dim-item{
  background:var(--bg-warm);
  border-radius:12px;
  padding:14px;
  text-align:center;
}
.dim-label{
  font-size:10px;
  color:var(--ink-muted);
  letter-spacing:2px;
  margin-bottom:6px;
}
.dim-value{
  font-size:14px;
  color:var(--ink);
  font-weight:500;
}
.dim-bar{
  height:3px;
  background:var(--accent-soft);
  border-radius:2px;
  margin-top:8px;
  overflow:hidden;
}
.dim-bar-fill{
  height:100%;
  background:var(--accent);
  border-radius:2px;
}

/* 详情 */
.detail-section{
  text-align:left;
  margin-bottom:20px;
}
.detail-section:last-child{margin-bottom:0}
.detail-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--accent);
  letter-spacing:3px;
  margin-bottom:10px;
}
.detail-title::before{
  content:'';
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent);
}
.detail-text{
  font-size:13px;
  color:var(--ink-light);
  line-height:2;
  padding-left:14px;
  border-left:1px solid var(--accent-soft);
}

/* 按钮组 */
.result-actions{
  display:flex;
  gap:12px;
  margin-top:24px;
}
.result-btn{
  flex:1;
  padding:14px;
  background:var(--bg-warm);
  border:1px solid transparent;
  border-radius:10px;
  font-family:'Noto Serif SC',serif;
  font-size:13px;
  color:var(--ink);
  letter-spacing:3px;
  cursor:pointer;
  transition:all 0.3s;
}
.result-btn:hover{
  background:var(--card);
  border-color:var(--accent-soft);
}
.result-btn.primary{
  background:var(--ink);
  color:var(--card);
}
.result-btn.primary:hover{background:var(--accent)}

/* ===== 底部导航 ===== */
.nav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:32px;
  padding:16px 20px 24px;
  background:var(--bg);
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  cursor:pointer;
  opacity:0.4;
  transition:all 0.3s;
}
.nav-item.active{opacity:1}
.nav-item:hover{opacity:0.8}
.nav-char{
  font-size:16px;
  color:var(--ink);
  font-weight:500;
}
.nav-dot{
  width:4px;
  height:4px;
  border-radius:50%;
  background:var(--accent);
  opacity:0;
  transition:all 0.3s;
}
.nav-item.active .nav-dot{opacity:1}
.nav-label{
  font-size:9px;
  color:var(--ink-muted);
  letter-spacing:1px;
}

/* ===== 历史页 ===== */
.history-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.history-item{
  background:var(--card);
  border-radius:16px;
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition:all 0.3s;
  box-shadow:0 2px 8px var(--shadow-soft);
}
.history-item:hover{transform:translateY(-2px);box-shadow:0 4px 16px var(--shadow)}
.history-left{display:flex;align-items:center;gap:16px}
.history-type{
  font-size:20px;
  font-weight:600;
  color:var(--ink);
  font-family:'Cormorant Garamond',serif;
}
.history-name{
  font-size:13px;
  color:var(--ink-light);
  letter-spacing:2px;
}
.history-date{
  font-size:11px;
  color:var(--ink-muted);
}

/* ===== 分享弹窗 ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:100;
}
.modal.active{display:flex}
.modal-card{
  background:var(--card);
  border-radius:20px;
  padding:28px;
  max-width:320px;
  width:100%;
  text-align:center;
}
.modal-title{
  font-size:16px;
  color:var(--ink);
  letter-spacing:4px;
  margin-bottom:16px;
}
.modal-text{
  font-size:13px;
  color:var(--ink-light);
  line-height:2;
  margin-bottom:20px;
}
.modal-close{
  padding:12px 32px;
  background:var(--bg-warm);
  border:none;
  border-radius:10px;
  font-family:'Noto Serif SC',serif;
  font-size:13px;
  color:var(--ink);
  cursor:pointer;
}

/* ===== 页面切换 ===== */
.page{display:none}
.page.active{display:block;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== 空状态 ===== */
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-muted);
}
.empty-icon{
  font-size:48px;
  margin-bottom:16px;
  opacity:0.3;
}
.empty-text{
  font-size:13px;
  letter-spacing:2px;
}
</style>
</head>
<body>
<div class="app">

<!-- 顶部 -->
<div class="header">
  <div class="app-title">识己 · 知人</div>
</div>

<!-- 主内容 -->
<div class="main">

<!-- 引导页 -->
<div class="page active" id="page-intro">
  <div class="card intro-card">
    <div class="intro-step">MBTI 古韵人格探索</div>
    <div class="intro-char">心</div>
    <div class="intro-pinyin">XIN</div>
    <div class="intro-illust">🌸</div>
    <div class="intro-poem">天地之大，知己难觅<br>然识己者，方能知人</div>
    <div class="intro-poem-vertical">以诗为镜照见本心</div>

    <!-- 恢复测试提示 -->
    <div id="resume-card" style="display:none;background:rgba(196,92,74,0.08);border:1px solid var(--accent-soft);border-radius:14px;padding:16px;margin-top:20px;text-align:left">
      <div style="font-size:12px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">◇ 检测到未完成的测试</div>
      <div style="font-size:13px;color:var(--ink-light);line-height:1.6;margin-bottom:12px" id="resume-info">已作答 <span id="resume-count"></span> 题</div>
      <div style="display:flex;gap:10px">
        <button onclick="resumeTest()" style="flex:1;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer">继续测试</button>
        <button onclick="discardProgress()" style="flex:1;padding:10px;background:transparent;color:var(--ink-muted);border:1px solid var(--ink-muted);border-radius:8px;font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer">重新开始</button>
      </div>
    </div>

    <button class="start-btn" onclick="startTest()" id="start-btn-main">开启测试</button>
  </div>
</div>

<!-- 测试页 -->
<div class="page" id="page-test">
  <div class="card">
    <div class="test-header">
      <div class="test-step" id="test-step">1 / 93</div>
      <div class="test-progress" id="test-progress"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span id="btn-prev" onclick="prevQuestion()" style="font-size:12px;color:var(--ink-muted);letter-spacing:1px;cursor:pointer;opacity:0.5;transition:all 0.3s">← 上一题</span>
      <span onclick="pauseTest()" style="font-size:11px;color:var(--ink-muted);letter-spacing:1px;cursor:pointer;opacity:0.6">⏸ 暂停</span>
    </div>
    <div class="question-main">
      <div class="question-dim" id="question-dim">外向 · 内向</div>
      <div class="question-text" id="question-text">加载中…</div>
      <div class="question-sub" id="question-sub"></div>
    </div>
    <div class="options" id="options"></div>
  </div>
</div>

<!-- 结果页 -->
<div class="page" id="page-result">
  <div class="card result-card" id="result-card"></div>
</div>

<!-- 历史页 -->
<div class="page" id="page-history">
  <div class="history-list" id="history-list"></div>
</div>

</div><!-- /main -->

<!-- 底部导航 -->
<div class="nav">
  <div class="nav-item active" onclick="showPage('intro')" data-page="intro">
    <div class="nav-char">始</div>
    <div class="nav-dot"></div>
    <div class="nav-label">首页</div>
  </div>
  <div class="nav-item" onclick="startTest()" data-page="test">
    <div class="nav-char">测</div>
    <div class="nav-dot"></div>
    <div class="nav-label">测试</div>
  </div>
  <div class="nav-item" onclick="showHistory()" data-page="history">
    <div class="nav-char">往</div>
    <div class="nav-dot"></div>
    <div class="nav-label">历史</div>
  </div>
</div>

</div><!-- /app -->

<!-- 分享弹窗 -->
<div class="modal" id="modal-share">
  <div class="modal-card">
    <div class="modal-title">分享你的心声</div>
    <div class="modal-text" id="share-content"></div>
    <button class="modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

<script>
// ==================== 诗词人格数据 ====================
const poeticDB={
  "INTJ":{four:"孤雁排云",pinyin:"GU YAN PAI YUN",name:"孤高清峻",poem:"「众鸟高飞尽，孤云独去闲」",figure:"李 白",desc:"诗仙，太白星落凡尘，独坐敬亭，孤高绝尘"},
  "INTP":{four:"秋水悟禅",pinyin:"QIU SHUI WU CHAN",name:"思辨空灵",poem:"「明月松间照，清泉石上流」",figure:"苏 轼",desc:"东坡居士，才通天地，词映古今"},
  "ENTJ":{four:"长风万里",pinyin:"CHANG FENG WAN LI",name:"豪迈凌云",poem:"「日月之行，若出其中」",figure:"曹 操",desc:"魏武挥鞭，一代枭雄，气吞山河"},
  "ENTP":{four:"春风化育",pinyin:"CHUN FENG HUA YU",name:"灵动飞扬",poem:"「大鹏一日同风起」",figure:"庄 子",desc:"逍遥游者，无拘无束，物我两忘"},
  "INFJ":{four:"幽兰空谷",pinyin:"YOU LAN KONG GU",name:"温润高洁",poem:"「空谷幽兰，孤芳自赏」",figure:"陶渊明",desc:"五柳先生，采菊东篱，悠然见山"},
  "INFP":{four:"落梅如雪",pinyin:"LUO MEI RU XUE",name:"纯粹孤绝",poem:"「零落成泥碾作尘，只有香如故」",figure:"林 逋",desc:"梅妻鹤子，孤山隐士，香远益清"},
  "ENFJ":{four:"春风化雨",pinyin:"CHUN FENG HUA YU",name:"润物无声",poem:"「随风潜入夜，润物细无声」",figure:"孔 子",desc:"万世师表，杏坛讲学，有教无类"},
  "ENFP":{four:"江海余生",pinyin:"JIANG HAI JI YU SHENG",name:"洒脱不羁",poem:"「小舟从此逝，江海寄余生」",figure:"苏 轼",desc:"东坡居士，一蓑烟雨任平生"},
  "ISTJ":{four:"松柏后凋",pinyin:"SONG BAI HOU DIAO",name:"沉稳持重",poem:"「岁寒，然后知松柏之后凋也」",figure:"杜 甫",desc:"诗圣，沉郁顿挫，忧国忧民"},
  "ISFJ":{four:"润物无声",pinyin:"RUN WU WU SHENG",name:"温厚绵长",poem:"「随风潜入夜，润物细无声」",figure:"孟浩然",desc:"春眠不觉晓，处处闻啼鸟"},
  "ESTJ":{four:"山岳巍然",pinyin:"SHAN YUE WEI RAN",name:"刚健笃定",poem:"「泰山崩于前而色不变」",figure:"诸葛亮",desc:"卧龙先生，出师一表，真名世"},
  "ESFJ":{four:"兰桂齐芳",pinyin:"LAN GUI QI FANG",name:"和煦温煦",poem:"「兰有秀兮菊有芳」",figure:"白居易",desc:"琵琶行主，关怀民间疾苦"},
  "ISTP":{four:"明月松间",pinyin:"MING YUE SONG JIAN",name:"静观自得",poem:"「明月松间照，清泉石上流」",figure:"王 维",desc:"诗佛，行到水穷处，坐看云起时"},
  "ISFP":{four:"流水落花",pinyin:"LIU SHUI LUO HUA",name:"柔韧从容",poem:"「流水落花春去也」",figure:"李清照",desc:"千古第一才女，如梦令里"},
  "ESTP":{four:"大江东去",pinyin:"DA JIANG DONG QU",name:"豪迈奔放",poem:"「大江东去，浪淘尽」",figure:"辛弃疾",desc:"词中之龙，挑灯看剑"},
  "ESFP":{four:"花间一壶",pinyin:"HUA JIAN YI HU",name:"风流旖旎",poem:"「花间一壶酒，独酌无相亲」",figure:"李 白",desc:"诗仙，将进酒，杯莫停"}
};

const dimInfo={
  EI:{name:"外向 · 内向",labels:["朝堂济世","山林归隐"]},
  SN:{name:"感知 · 直觉",labels:["烟火人间","诗意苍穹"]},
  TF:{name:"思考 · 情感",labels:["冷眼观潮","柔肠济世"]},
  JP:{name:"判断 · 知觉",labels:["循法守正","逍遥任运"]}
};

// ==================== 93题 ====================

// ==================== 状态 ====================
let curQ=0,answers=[],scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},history=[];
const PROGRESS_KEY='mbti-progress-v2';
const EXPIRE_MS=7*24*60*60*1000; // 7天过期

// ==================== 初始化 ====================
window.onload=function(){
  loadData();
  initProgressDots();
  checkResume();
};

function loadData(){
  try{
    const h=localStorage.getItem('mbti-history');
    if(h)history=JSON.parse(h);
  }catch(e){history=[];}
}

function checkResume(){
  try{
    const raw=localStorage.getItem(PROGRESS_KEY);
    if(!raw)return;
    const p=JSON.parse(raw);
    // 过期检查
    if(Date.now()-p.savedAt>EXPIRE_MS){
      localStorage.removeItem(PROGRESS_KEY);
      return;
    }
    // 有效进度
    if(p.answers&&p.answers.length>0&&p.answers.length<questions.length){
      document.getElementById('resume-card').style.display='block';
      document.getElementById('resume-count').textContent=p.answers.length;
      window._savedProgress=p;
    }
  }catch(e){console.error(e);}
}

function resumeTest(){
  const p=window._savedProgress;
  if(!p)return;
  curQ=p.curQ;
  answers=p.answers;
  scores=p.scores;
  showQuestion();
  showPage('test');
  // 不删除进度，下次会再次提示
}

function saveProgress(){
  try{
    const data={curQ,answers,scores,savedAt:Date.now()};
    localStorage.setItem(PROGRESS_KEY,JSON.stringify(data));
  }catch(e){console.error(e);}
}

function clearProgress(){
  try{localStorage.removeItem(PROGRESS_KEY);}catch(e){}
  curQ=0;answers=[];scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
}

function pauseTest(){
  saveProgress();
  // 提示用户已保存
  const btn=document.querySelector('.start-btn');
  // 简单提示
  if(confirm('进度已保存，下次进来会自动询问是否继续。\n\n确定要退出吗？')){
    clearProgress();
    showPage('intro');
  }
}

function saveHistory(type){
  const now=new Date();
  history.unshift({type,date:now.toLocaleDateString('zh-CN'),time:now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
  if(history.length>20)history=history.slice(0,20);
  try{localStorage.setItem('mbti-history',JSON.stringify(history));}catch(e){}
}

// ==================== 页面切换 ====================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelector('.nav-item[data-page="'+name+'"]')?.classList.add('active');
}

// ==================== 测试逻辑 ====================
function initProgressDots(){
  const wrap=document.getElementById('test-progress');
  wrap.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='progress-dot'+(i===0?' active':'');
    wrap.appendChild(d);
  }
}

function updateProgress(){
  const pct=Math.floor((curQ/questions.length)*5);
  document.querySelectorAll('.progress-dot').forEach((d,i)=>{
    d.classList.toggle('active',i<=pct);
  });
  document.getElementById('test-step').textContent=(curQ+1)+' / '+questions.length;
}

function startTest(){
  // 如果有保存的进度，让用户选择恢复或重开
  if(window._savedProgress){
    if(!confirm('检测到未完成的测试（第 '+(window._savedProgress.answers.length+1)+' 题）。\n\n确定要重新开始吗？\n点击「取消」继续上次的测试。')){
      resumeTest();
      return;
    }
  }
  clearProgress();
  curQ=0;answers=[];scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  showQuestion();
  showPage('test');
}

function showQuestion(){
  const q=questions[curQ];
  document.getElementById('question-dim').textContent=dimInfo[q.dim].name;
  document.getElementById('question-text').textContent=q.text;
  document.getElementById('question-sub').textContent='「'+dimInfo[q.dim].labels[0]+' ←→ '+dimInfo[q.dim].labels[1]+'」';
  
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const d=document.createElement('div');
    d.className='option';
    d.innerHTML='<div class="option-text">'+opt+'</div>';
    d.onclick=()=>selectOption(i,q.dim);
    opts.appendChild(d);
  });
  // 如果是恢复的进度，且该题已作答过，显示选中状态
  const prev=answers.find(a=>a.q===curQ);
  if(prev){
    document.querySelectorAll('.option').forEach((el,i)=>el.classList.toggle('selected',i===prev.choice));
  }
  // 上一题按钮状态
  const prevBtn=document.getElementById('btn-prev');
  if(curQ===0){
    prevBtn.style.opacity='0.3';
    prevBtn.style.cursor='not-allowed';
  }else{
    prevBtn.style.opacity='0.7';
    prevBtn.style.cursor='pointer';
  }
  updateProgress();
}

function prevQuestion(){
  if(curQ===0)return;
  // 回退：弹出一条已答的记录，扣分
  const last=answers.pop();
  if(last){
    const q=questions[last.q];
    const first=q.dim[0],second=q.dim[1];
    if(last.choice===0)scores[first]--;else scores[second]--;
  }
  curQ--;
  saveProgress();
  showQuestion();
}

function selectOption(idx,dim){
  document.querySelectorAll('.option').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  answers.push({q:curQ,choice:idx});
  const first=dim[0],second=dim[1];
  if(idx===0)scores[first]++;else scores[second]++;
  saveProgress(); // 实时保存
  setTimeout(()=>{
    curQ++;
    if(curQ<questions.length){
      showQuestion();
    }else{
      clearProgress(); // 全部完成
      showResult();
    }
  },250);
}

function calcType(){
  return (scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
}

// ==================== 结果页 ====================
function showResult(){
  const type=calcType();
  saveHistory(type);
  clearProgress(); // 清进度
  renderResult(type);
  showPage('result');
}

function renderResult(type){
  const db=poeticDB[type];
  const dims=[
    {code:'EI',label:'外向',opp:'内向',val:scores.E,oppVal:scores.I},
    {code:'SN',label:'实感',opp:'直觉',val:scores.S,oppVal:scores.N},
    {code:'TF',label:'思考',opp:'情感',val:scores.T,oppVal:scores.F},
    {code:'JP',label:'判断',opp:'知觉',val:scores.J,oppVal:scores.P}
  ];
  
  document.getElementById('result-card').innerHTML=`
    <div class="result-type-tag">${type} · ${db.name}</div>
    <div class="result-four">${db.four}</div>
    <div class="result-pinyin">${db.pinyin}</div>
    <div class="result-figure">
      <div class="result-avatar">人</div>
      <div class="result-figure-name">${db.figure}</div>
    </div>
    <div class="result-poem">${db.poem}<br><span style="opacity:0.6">—— ${db.desc}</span></div>
    <div class="dims-grid">
      ${dims.map(d=>`
        <div class="dim-item">
          <div class="dim-label">${d.label} · ${d.opp}</div>
          <div class="dim-value">${d.val} : ${d.oppVal}</div>
          <div class="dim-bar"><div class="dim-bar-fill" style="width:${d.val/(d.val+d.oppVal)*100||50}%"></div></div>
        </div>
      `).join('')}
    </div>
    <div class="result-actions">
      <button class="result-btn" onclick="showHistory()">历史</button>
      <button class="result-btn primary" onclick="startTest()">重测</button>
    </div>
  `;
}

// ==================== 历史页 ====================
function showHistory(){
  const list=document.getElementById('history-list');
  if(history.length===0){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-text">暂无记录</div></div>';
  }else{
    list.innerHTML=history.map(h=>`
      <div class="history-item" onclick="rerenderResult('${h.type}')">
        <div class="history-left">
          <div class="history-type">${h.type}</div>
          <div class="history-name">${poeticDB[h.type]?.four||''}</div>
        </div>
        <div class="history-date">${h.date}</div>
      </div>
    `).join('');
  }
  showPage('history');
}

function rerenderResult(type){
  renderResult(type);
  showPage('result');
}

// ==================== 弹窗 ====================
function closeModal(){
  document.getElementById('modal-share').classList.remove('active');
}

// ==================== 暴露 ====================
window.startTest=startTest;
window.showPage=showPage;
window.showHistory=showHistory;
window.closeModal=closeModal;
window.rerenderResult=rerenderResult;
window.resumeTest=resumeTest;
window.pauseTest=pauseTest;
window.discardProgress=discardProgress;
window.prevQuestion=prevQuestion;
