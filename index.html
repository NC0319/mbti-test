<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI测试 - 简化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        button:active { transform: scale(0.98); }
        .question { font-size: 1.2em; margin: 20px 0; line-height: 1.6; }
        .option {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .option:active { background: #667eea; color: white; }
        .progress { background: #e0e0e0; height: 10px; border-radius: 10px; margin: 20px 0; }
        .progress-fill { background: #667eea; height: 100%; border-radius: 10px; transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="intro-page" class="page active">
            <h1>MBTI人格测试</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">5道题 · 快速测试</p>
            <button onclick="startTest()">开始测试</button>
        </div>

        <!-- 测试页 -->
        <div id="test-page" class="page">
            <div class="progress">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="question" id="question-text"></div>
            <div class="option" onclick="selectOption(0)">A. <span id="opt0"></span></div>
            <div class="option" onclick="selectOption(1)">B. <span id="opt1"></span></div>
            <button onclick="nextQuestion()" style="margin-top: 20px;">下一题</button>
        </div>

        <!-- 结果页 -->
        <div id="result-page" class="page">
            <h1>测试完成！</h1>
            <p style="text-align: center; font-size: 1.5em; margin: 30px 0;" id="result-type"></p>
            <p style="text-align: center; color: #666;">这是简化版结果</p>
            <button onclick="restart()">重新测试</button>
        </div>
    </div>

    <script>
        // 超简单的数据
        const questions = [
            { text: "你更喜欢：", options: ["与人交流", "独自思考"] },
            { text: "你更倾向于：", options: ["关注细节", "关注整体"] },
            { text: "做决定时你：", options: ["凭逻辑分析", "凭感觉判断"] },
            { text: "你更喜欢：", options: ["提前计划", "随机应变"] },
            { text: "在社交中你：", options: ["主动外向", "安静内向"] }
        ];

        let current = 0;
        let answers = [];

        function startTest() {
            alert("开始测试函数被调用了！");
            current = 0;
            answers = [];
            showPage('test-page');
            showQuestion();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showQuestion() {
            alert("显示第 " + (current + 1) + " 题");
            const q = questions[current];
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('opt0').textContent = q.options[0];
            document.getElementById('opt1').textContent = q.options[1];
            document.getElementById('progress-fill').style.width = ((current + 1) / questions.length * 100) + '%';
        }

        function selectOption(idx) {
            answers[current] = idx;
            alert("选择了选项 " + idx);
        }

        function nextQuestion() {
            alert("点击了下一题，当前第 " + (current + 1) + " 题");
            if (answers[current] === undefined) {
                alert("请先选择一个选项！");
                return;
            }
            current++;
            if (current >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function showResult() {
            const type = answers[0] === 0 ? 'E' : 'I';
            document.getElementById('result-type').textContent = type + '类型';
            showPage('result-page');
        }

        function restart() {
            showPage('intro-page');
        }

        alert("脚本加载完成！");
    </script>
</body>
</html>
