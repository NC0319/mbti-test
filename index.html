<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>识己·知人 — MBTI古韵人格测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--ink:#1a1a2e;--ink-mid:#2d2d2d;--ink-light:#5a5a5a;
--paper:#f5f0e8;--paper-dark:#e8e0d0;
--celadon:#7fa89a;--cinnabar:#b8403a;--bamboo:#6b8e6b;
--jade:#5a8a7a;--gold:#c9a84c;--mist:#d4cfc7;
}
body{font-family:'Noto Serif SC','STSong','SimSun',serif;background:var(--ink);color:var(--ink-mid);min-height:100vh;overflow-x:hidden}

/* ===== 水墨山水背景 ===== */
.mountain-bg{
position:fixed;inset:0;z-index:0;overflow:hidden;
}
.mountain-bg::before{
content:'';position:absolute;inset:0;
background:
  /* 远山淡影 */
  radial-gradient(ellipse 120% 40% at 50% 90%,#1e2a3a 0%,transparent 70%),
  /* 天际微光 */
  radial-gradient(ellipse 80% 30% at 50% 10%,#2a3a4a 0%,transparent 80%),
  /* 主背景 */
  linear-gradient(175deg,#0d1117 0%,#1a2332 40%,#1e2a3a 100%);
}
.mountain-bg::after{
content:'';position:absolute;bottom:0;left:0;right:0;height:60%;
background:
  /* 第一层远山 */
  radial-gradient(ellipse 200% 25% at 20% 100%,#243040 0%,transparent 60%),
  radial-gradient(ellipse 180% 30% at 80% 100%,#1e2a38 0%,transparent 55%),
  /* 第二层中山 */
  radial-gradient(ellipse 160% 22% at 35% 100%,#1a2830 0%,transparent 50%),
  radial-gradient(ellipse 140% 20% at 65% 100%,#162230 0%,transparent 48%),
  /* 前景 */
  radial-gradient(ellipse 100% 15% at 50% 100%,#0f1a22 0%,transparent 40%);
animation: mountainDrift 20s ease-in-out infinite alternate;
}
@keyframes mountainDrift{
0%{opacity:0.85;transform:scaleX(1)}
50%{opacity:1;transform:scaleX(1.02)}
100%{opacity:0.9;transform:scaleX(0.98)}
}

/* 宣纸纹理叠加 */
.paper-texture{
position:fixed;inset:0;z-index:1;pointer-events:none;
background-image:
  repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(245,240,232,0.015) 2px,rgba(245,240,232,0.015) 4px),
  repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(245,240,232,0.008) 2px,rgba(245,240,232,0.008) 4px);
}

/* ===== 页面通用 ===== */
.page{display:none;position:relative;z-index:2;min-height:100vh}
.page.active{display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.5s ease}

/* 通用装饰边框 */
.ornament-border{
border:1px solid rgba(200,180,150,0.2);
position:relative;
}
.ornament-border::before,.ornament-border::after{
content:'◈';position:absolute;color:rgba(200,180,150,0.4);font-size:12px;
}
.ornament-border::before{top:-7px;left:50%;transform:translateX(-50%);background:var(--ink);padding:0 8px;}
.ornament-border::after{bottom:-7px;left:50%;transform:translateX(-50%);background:var(--ink);padding:0 8px;}

/* ===== 引导页 ===== */
#intro-page{
padding:40px 20px;
justify-content:center;
}
.intro-seal{
width:90px;height:90px;border-radius:50%;
background:linear-gradient(135deg,var(--cinnabar),#8b2e28);
display:flex;align-items:center;justify-content:center;
margin-bottom:28px;
box-shadow:0 0 30px rgba(184,64,58,0.4),0 0 60px rgba(184,64,58,0.15);
animation: sealPulse 3s ease-in-out infinite;
}
@keyframes sealPulse{
0%,100%{box-shadow:0 0 30px rgba(184,64,58,0.4),0 0 60px rgba(184,64,58,0.15)}
50%{box-shadow:0 0 40px rgba(184,64,58,0.6),0 0 80px rgba(184,64,58,0.25)}
}
.seal-char{
font-size:36px;color:#f5f0e8;
font-family:'Noto Serif SC',serif;font-weight:700;
writing-mode:vertical-rl;letter-spacing:4px;
}
.intro-title{
font-size:clamp(28px,6vw,48px);color:var(--paper);
letter-spacing:12px;margin-bottom:12px;
text-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.intro-subtitle{
font-size:15px;color:var(--mist);letter-spacing:4px;
margin-bottom:8px;opacity:0.8;
}
.intro-poem{
font-size:13px;color:var(--celadon);letter-spacing:2px;
margin-bottom:48px;font-style:italic;opacity:0.7;
max-width:320px;text-align:center;line-height:1.8;
}
.ornament-divider{
width:60px;height:1px;
background:linear-gradient(90deg,transparent,var(--celadon),transparent);
margin:20px auto;
}

/* 毛笔按钮 */
.brush-btn{
background:transparent;
border:1px solid rgba(200,180,150,0.5);
color:var(--paper);font-family:'Noto Serif SC',serif;
font-size:16px;letter-spacing:6px;padding:14px 48px;
cursor:pointer;position:relative;overflow:hidden;
transition:all 0.4s ease;
}
.brush-btn::before{
content:'';position:absolute;inset:0;
background:radial-gradient(ellipse at center,rgba(127,168,154,0.3) 0%,transparent 70%);
opacity:0;transition:opacity 0.4s ease;
}
.brush-btn:hover{
border-color:var(--celadon);
color:var(--celadon);
box-shadow:0 0 30px rgba(127,168,154,0.3),0 0 60px rgba(127,168,154,0.1);
}
.brush-btn:hover::before{opacity:1;}
.brush-btn:active{transform:scale(0.98);}

/* ===== 测试页 ===== */
#test-page{
padding:20px;justify-content:flex-start;padding-top:40px;
}
.test-header{
width:100%;max-width:600px;margin-bottom:20px;
}
.dimension-tag{
display:inline-block;font-size:12px;color:var(--celadon);
border:1px solid rgba(127,168,154,0.4);
padding:3px 12px;border-radius:20px;
letter-spacing:3px;margin-bottom:20px;
}
.dim-EI{color:var(--celadon);border-color:rgba(127,168,154,0.5)}
.dim-SN{color:var(--gold);border-color:rgba(201,168,76,0.5)}
.dim-TF{color:var(--cinnabar);border-color:rgba(184,64,58,0.5)}
.dim-JP{color:var(--bamboo);border-color:rgba(107,142,107,0.5)}

.question-card{
width:100%;max-width:600px;
background:rgba(245,240,232,0.06);
backdrop-filter:blur(10px);
border:1px solid rgba(200,180,150,0.15);
padding:clamp(24px,5vw,40px);
margin-bottom:24px;
}
.question-text{
font-size:clamp(16px,4vw,20px);color:var(--paper);
line-height:1.8;margin-bottom:8px;letter-spacing:1px;
}
.question-hint{
font-size:12px;color:var(--mist);opacity:0.6;letter-spacing:1px;
}

/* 选项 */
.options-list{width:100%;max-width:600px;display:flex;flex-direction:column;gap:10px;}
.option-item{
background:rgba(245,240,232,0.04);
border:1px solid rgba(200,180,150,0.2);
color:var(--paper);font-family:'Noto Serif SC',serif;
font-size:15px;padding:14px 20px;text-align:left;
cursor:pointer;transition:all 0.3s ease;
display:flex;align-items:center;gap:12px;
line-height:1.6;
}
.option-item::before{
content:'';width:20px;height:20px;border-radius:50%;
border:1px solid rgba(200,180,150,0.4);
flex-shrink:0;transition:all 0.3s ease;
}
.option-item:hover{
background:rgba(127,168,154,0.12);
border-color:rgba(127,168,154,0.5);
}
.option-item:hover::before{
border-color:var(--celadon);background:rgba(127,168,154,0.3);
}
.option-item.selected{
background:rgba(127,168,154,0.18);
border-color:var(--celadon);color:var(--celadon);
}
.option-item.selected::before{
border-color:var(--celadon);background:var(--celadon);
box-shadow:0 0 10px rgba(127,168,154,0.5);
}

/* 进度条 */
.progress-wrap{width:100%;max-width:600px;margin-top:auto;padding:20px 0 40px;}
.progress-bar{
height:3px;background:rgba(200,180,150,0.15);border-radius:2px;overflow:hidden;
}
.progress-fill{
height:100%;background:linear-gradient(90deg,var(--celadon),var(--jade));
border-radius:2px;transition:width 0.5s ease;
}
.progress-text{
text-align:center;font-size:12px;color:var(--mist);opacity:0.5;
margin-top:12px;letter-spacing:3px;
}

/* ===== 结果页 ===== */
#result-page{
padding:40px 20px;overflow-y:auto;align-items:center;
}
.result-inner{width:100%;max-width:640px;}

/* 四字标题 */
.result-title-block{
text-align:center;margin-bottom:32px;
}
.result-four-char{
font-size:clamp(48px,12vw,80px);color:var(--paper);
letter-spacing:16px;line-height:1.2;
font-weight:700;
text-shadow:0 4px 30px rgba(0,0,0,0.4);
animation:titleReveal 0.8s ease-out;
}
@keyframes titleReveal{
0%{opacity:0;transform:translateY(20px) scale(0.95)}
100%{opacity:1;transform:translateY(0) scale(1)}
}
.result-type-line{
margin-top:16px;display:flex;align-items:center;justify-content:center;gap:20px;
}
.result-mbti{
font-family:'Cormorant Garamond',serif;font-size:24px;
color:var(--gold);letter-spacing:4px;font-weight:600;
}
.result-sep{color:rgba(200,180,150,0.3);font-size:20px;}
.result-poetic-name{
font-size:16px;color:var(--celadon);letter-spacing:4px;
}
.result-poem{
font-size:13px;color:var(--mist);opacity:0.6;
font-style:italic;margin-top:8px;letter-spacing:1px;
max-width:400px;margin-left:auto;margin-right:auto;
line-height:1.8;
}

/* 历史人物 */
.figure-block{
text-align:center;margin:24px 0;
padding:16px;
border-top:1px solid rgba(200,180,150,0.1);
border-bottom:1px solid rgba(200,180,150,0.1);
}
.figure-name{
font-size:18px;color:var(--gold);letter-spacing:4px;margin-bottom:4px;
}
.figure-desc{
font-size:13px;color:var(--mist);opacity:0.6;letter-spacing:1px;
}

/* 四维解析 */
.dimension-results{
display:grid;grid-template-columns:1fr 1fr;gap:12px;
margin:24px 0;
}
.dim-result{
background:rgba(245,240,232,0.04);
border:1px solid rgba(200,180,150,0.12);
padding:12px 16px;
}
.dim-result-label{
font-size:11px;color:var(--mist);opacity:0.5;letter-spacing:3px;margin-bottom:6px;
}
.dim-result-value{
font-size:15px;color:var(--paper);letter-spacing:2px;margin-bottom:2px;
}
.dim-result-sub{
font-size:12px;color:var(--celadon);opacity:0.7;
}

/* 长描述 */
.result-detail-card{
background:rgba(245,240,232,0.04);
border:1px solid rgba(200,180,150,0.1);
padding:clamp(20px,4vw,32px);
margin:20px 0;
}
.detail-section{margin-bottom:20px;}
.detail-section:last-child{margin-bottom:0;}
.detail-title{
font-size:13px;color:var(--celadon);letter-spacing:4px;
margin-bottom:10px;padding-bottom:8px;
border-bottom:1px solid rgba(200,180,150,0.1);
}
.detail-text{
font-size:14px;color:var(--paper);line-height:2;
opacity:0.85;letter-spacing:0.5px;
}

/* 分享/重测按钮 */
.result-actions{
display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
margin-top:32px;
}
.action-btn{
background:transparent;border:1px solid rgba(200,180,150,0.3);
color:var(--paper);font-family:'Noto Serif SC',serif;
font-size:13px;letter-spacing:3px;padding:10px 28px;
cursor:pointer;transition:all 0.3s ease;
}
.action-btn:hover{
border-color:var(--celadon);color:var(--celadon);
box-shadow:0 0 20px rgba(127,168,154,0.2);
}

/* ===== 动画 ===== */
@keyframes fadeIn{
0%{opacity:0;transform:translateY(10px)}
100%{opacity:1;transform:translateY(0)}
}
.fade-in{animation:fadeIn 0.5s ease}

/* ===== 历史记录 ===== */
#history-page{
padding:40px 20px;align-items:center;
}
.history-inner{width:100%;max-width:500px;}
.history-title{
font-size:20px;color:var(--paper);letter-spacing:6px;text-align:center;
margin-bottom:24px;
}
.history-item{
background:rgba(245,240,232,0.04);
border:1px solid rgba(200,180,150,0.12);
padding:14px 20px;margin-bottom:10px;
display:flex;align-items:center;justify-content:space-between;
cursor:pointer;transition:all 0.3s;
}
.history-item:hover{
border-color:rgba(127,168,154,0.4);background:rgba(127,168,154,0.08);
}
.history-type{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);letter-spacing:2px;}
.history-name{font-size:13px;color:var(--celadon);letter-spacing:2px;}
.history-date{font-size:11px;color:var(--mist);opacity:0.4;letter-spacing:1px;}
.history-empty{
text-align:center;color:var(--mist);opacity:0.4;
font-size:14px;letter-spacing:3px;padding:40px;
}

/* ===== 加载中 ===== */
.loading-overlay{
position:fixed;inset:0;z-index:100;
background:var(--ink);display:flex;flex-direction:column;
align-items:center;justify-content:center;
}
.loading-text{
font-size:16px;color:var(--mist);letter-spacing:6px;margin-top:20px;
}
.loading-seal{font-size:48px;color:var(--cinnabar);animation:sealPulse 1.5s ease-in-out infinite;}

/* ===== 手机适配 ===== */
@media(max-width:480px){
.result-four-char{letter-spacing:10px;}
.dimension-results{grid-template-columns:1fr;}
.result-type-line{flex-direction:column;gap:8px;}
.result-actions{flex-direction:column;align-items:center;}
}

/* 历史人物头像装饰 */
.figure-avatar{
width:48px;height:48px;border-radius:50%;
background:linear-gradient(135deg,var(--celadon),var(--jade));
display:inline-flex;align-items:center;justify-content:center;
font-size:22px;margin-bottom:10px;
opacity:0.8;
}

/* 分享模态框 */
.modal-overlay{
position:fixed;inset:0;z-index:50;
background:rgba(10,15,20,0.85);display:none;
align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.active{display:flex;}
.modal-box{
background:#1a2332;border:1px solid rgba(200,180,150,0.2);
padding:32px;max-width:400px;width:100%;
text-align:center;
}
.modal-title{font-size:16px;color:var(--paper);letter-spacing:4px;margin-bottom:16px;}
.modal-text{font-size:13px;color:var(--mist);opacity:0.7;line-height:1.8;margin-bottom:24px;letter-spacing:1px;}
.modal-close{
background:transparent;border:1px solid rgba(200,180,150,0.3);
color:var(--paper);font-family:'Noto Serif SC',serif;
font-size:13px;letter-spacing:3px;padding:8px 24px;cursor:pointer;
}
</style>
</head>
<body>

<!-- 山水背景 -->
<div class="mountain-bg"></div>
<div class="paper-texture"></div>

<!-- 加载页 -->
<div class="loading-overlay" id="loading">
  <div class="loading-seal">心</div>
  <div class="loading-text">识己知人</div>
</div>

<!-- 引导页 -->
<div class="page" id="intro-page">
  <div class="intro-seal"><span class="seal-char">心</span></div>
  <h1 class="intro-title">识己·知人</h1>
  <p class="intro-subtitle">MBTI 人格探索</p>
  <div class="ornament-divider"></div>
  <p class="intro-poem">
    众鸟高飞尽，孤云独去闲<br>
    天地之大，知己难觅<br>
    然识己者，方能知人
  </p>
  <button class="brush-btn" onclick="startTest()">开启测试</button>
  <div style="margin-top:20px">
    <button class="brush-btn" onclick="showHistory()" style="font-size:13px;padding:10px 32px;letter-spacing:4px;opacity:0.6">查看历史</button>
  </div>
</div>

<!-- 测试页 -->
<div class="page" id="test-page">
  <div class="test-header">
    <div class="dimension-tag" id="dimension-tag">外向 · 内向</div>
    <div class="question-card fade-in">
      <div class="question-text" id="question-text">加载中…</div>
      <div class="question-hint" id="question-hint"></div>
    </div>
  </div>
  <div class="options-list" id="options-list"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">1 / 93</div>
  </div>
</div>

<!-- 结果页 -->
<div class="page" id="result-page">
  <div class="result-inner" id="result-inner"></div>
</div>

<!-- 历史记录页 -->
<div class="page" id="history-page">
  <div class="history-inner">
    <h2 class="history-title">往昔心声</h2>
    <div id="history-list"></div>
    <div style="text-align:center;margin-top:24px">
      <button class="brush-btn" onclick="showIntro()" style="font-size:13px;padding:10px 32px;letter-spacing:4px">返回</button>
    </div>
  </div>
</div>

<!-- 分享模态框 -->
<div class="modal-overlay" id="share-modal">
  <div class="modal-box">
    <div class="modal-title">分享你的心声</div>
    <div class="modal-text" id="share-text"></div>
    <button class="modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

  {id:86,text:"你更享受：",dimension:"JP",options:["把事情做完的满足感","保持各种可能性的自由感"]},
  {id:87,text:"你倾向于：",dimension:"JP",options:["遵守日程和安排","保持弹性和适应性"]},
  {id:88,text:"在开始一个新项目前，你：",dimension:"JP",options:["先制定详细的计划","先做起来再说"]},
  {id:89,text:"你更喜欢哪种生活方式：",dimension:"JP",options:["有目标、有方向","自由、随缘"]},
  {id:90,text:"当有人说「计划赶不上变化」时，你：",dimension:"JP",options:["同意，计划本来就需要灵活","不认同，好的计划能应对变化"]},
  {id:91,text:"你的生活哲学接近：",dimension:"JP",options:["「谋事在人，成事在天」","「顺其自然，无为而治」"]},
  {id:92,text:"你更倾向于是：",dimension:"JP",options:["一个组织者","一个探索者"]},
  {id:93,text:"最终，你认为：",dimension:"JP",options:["有计划的人生更有意义","活在当下，随遇而安更自在"]}
];

// ==================== 全局状态 ====================
let currentQuestion = 0;
let answers = [];
let scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
let savedResults = [];

// ==================== 初始化 ====================
window.onerror = function(msg,url,line,col,err){
  console.error('Error:',msg,'Line:',line,'Col:',col);
  alert('系统错误: '+msg+' (行:'+line+')');
  return false;
};

window.onload = function(){
  loadProgress();
  loadResults();
  showIntro();
  setTimeout(()=>{document.getElementById('loading').style.display='none';},800);
};

function showIntro(){
  showPage('intro-page');
}

function showHistory(){
  renderHistory();
  showPage('history-page');
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function loadProgress(){
  try{
    const p = localStorage.getItem('mbti-progress');
    if(p){
      const d = JSON.parse(p);
      if(d.answers && d.answers.length>0 && confirm('检测到未完成的测试，是否继续？\n点击「取消」开始新测试。')){
        answers = d.answers;
        scores = d.scores;
        currentQuestion = d.current;
        showQuestion();
        showPage('test-page');
        return;
      }
    }
  }catch(e){}
  localStorage.removeItem('mbti-progress');
}

function saveProgress(){
  try{
    localStorage.setItem('mbti-progress',JSON.stringify({answers,scores,current:currentQuestion}));
  }catch(e){}
}

function discardProgress(){
  answers=[];scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};currentQuestion=0;
  localStorage.removeItem('mbti-progress');
}

function loadResults(){
  try{
    savedResults=JSON.parse(localStorage.getItem('mbti-results')||'[]');
  }catch(e){savedResults=[];}
}

function saveResult(mbtiType){
  const now=new Date();
  savedResults.unshift({
    type:mbtiType,
    date:now.toLocaleDateString('zh-CN'),
    time:now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})
  });
  if(savedResults.length>10)savedResults=savedResults.slice(0,10);
  try{localStorage.setItem('mbti-results',JSON.stringify(savedResults));}catch(e){}
}

function clearAllHistory(){
  if(confirm('确定清除所有历史记录？此操作不可恢复。')){
    savedResults=[];
    try{localStorage.removeItem('mbti-results');}catch(e){}
    renderHistory();
  }
}

// ==================== 测试逻辑 ====================
function startTest(){
  answers=[];scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};currentQuestion=0;
  showQuestion();
  showPage('test-page');
}

function showQuestion(){
  const q=questions[currentQuestion];
  const tag=document.getElementById('dimension-tag');
  tag.textContent=dimNames[q.dimension];
  tag.className='dimension-tag '+dimTags[q.dimension];

  const qText=document.getElementById('question-text');
  const qHint=document.getElementById('question-hint');
  qText.textContent=(currentQuestion+1)+'. '+q.text;
  qHint.textContent='「'+dimLabels[q.dimension][0]+' ←→ '+dimLabels[q.dimension][1]+'」';

  const optList=document.getElementById('options-list');
  optList.innerHTML='';
  q.options.forEach((opt,i)=>{
    const div=document.createElement('div');
    div.className='option-item fade-in';
    div.style.animationDelay=(i*0.08)+'s';
    div.textContent=opt;
    div.onclick=()=>selectOption(i,q.dimension);
    optList.appendChild(div);
  });

  const pct=Math.round((currentQuestion/questions.length)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=(currentQuestion+1)+' / '+questions.length;
  saveProgress();
}

function selectOption(idx,dimension){
  // 记录答案
  answers.push({q:currentQuestion,choice:idx});
  // 计分：偶数索引→第一个字母多
  const first=dimension[0],second=dimension[1];
  if(idx===0)scores[first]++;else scores[second]++;

  document.querySelectorAll('.option-item').forEach((el,i)=>{
    el.classList.remove('selected');
    if(i===idx)el.classList.add('selected');
  });

  setTimeout(()=>{
    currentQuestion++;
    if(currentQuestion<questions.length){
      showQuestion();
    }else{
      showResult();
    }
  },300);
}

// ==================== 结果计算 ====================
function calculateType(){
  let type='';
  type+=(scores.E>=scores.I?'E':'I');
  type+=(scores.S>=scores.N?'S':'N');
  type+=(scores.T>=scores.F?'T':'F');
  type+=(scores.J>=scores.P?'J':'P');
  return type;
}

function showResult(){
  localStorage.removeItem('mbti-progress');
  const type=calculateType();
  saveResult(type);
  renderResult(type);
  showPage('result-page');
}

function renderResult(type){
  const db=poeticDB[type];
  const dimData=[
    {dim:'EI',val:scores.E,opp:scores.I,label:'外向',oppLabel:'内向'},
    {dim:'SN',val:scores.S,opp:scores.N,label:'实感',oppLabel:'直觉'},
    {dim:'TF',val:scores.T,opp:scores.F,label:'思考',oppLabel:'情感'},
    {dim:'JP',val:scores.J,opp:scores.P,label:'判断',oppLabel:'知觉'}
  ];

  const container=document.getElementById('result-inner');
  container.innerHTML=`
    <div class="result-title-block">
      <div class="result-four-char">${db.fourChar}</div>
      <div class="result-type-line">
        <span class="result-mbti">${type}</span>
        <span class="result-sep">｜</span>
        <span class="result-poetic-name">${db.poeticName}</span>
      </div>
      <div class="result-poem">${db.poem}</div>
    </div>

    <div class="figure-block">
      <div class="figure-avatar">人</div>
      <div class="figure-name">${db.figure}</div>
      <div class="figure-desc">${db.figureDesc}</div>
    </div>

    <div class="dimension-results">
      ${dimData.map(d=>`
        <div class="dim-result">
          <div class="dim-result-label">${dimNames[d.dim]}</div>
          <div class="dim-result-value">${d.label} ${d.val} : ${d.opp} ${d.oppLabel}</div>
          <div class="dim-result-sub">${d.val>d.opp?dimLabels[d.dim][0]:dimLabels[d.dim][1]}</div>
        </div>
      `).join('')}
    </div>

    <div class="result-detail-card">
      <div class="detail-section">
        <div class="detail-title">长处</div>
        <div class="detail-text">${db.strengths}</div>
      </div>
      <div class="detail-section">
        <div class="detail-title">短板</div>
        <div class="detail-text">${db.weaknesses}</div>
      </div>
      <div class="detail-section">
        <div class="detail-title">契合领域</div>
        <div class="detail-text">${db.careers}</div>
      </div>
      <div class="detail-section">
        <div class="detail-title">情感与关系</div>
        <div class="detail-text">${db.relationship}</div>
      </div>
      <div class="detail-section">
        <div class="detail-title">成长之路</div>
        <div class="detail-text">${db.growth}</div>
      </div>
      <div class="detail-section">
        <div class="detail-title">知己难觅</div>
        <div class="detail-text">${db.compatibility}</div>
      </div>
    </div>

    <div class="result-actions">
      <button class="action-btn" onclick="shareResult('${type}','${db.fourChar}')">分 享</button>
      <button class="action-btn" onclick="showHistory()">历 史</button>
      <button class="action-btn" onclick="startTest()">重 测</button>
    </div>
  `;
}

function renderHistory(){
  const list=document.getElementById('history-list');
  if(savedResults.length===0){
    list.innerHTML='<div class="history-empty">尚无记录<br>开启你的第一次探索</div>';
    return;
  }
  list.innerHTML=savedResults.map(r=>`
    <div class="history-item" onclick="rerenderResult('${r.type}')">
      <div>
        <div class="history-type">${r.type}</div>
        <div class="history-name">${poeticDB[r.type]?poeticDB[r.type].fourChar:''}</div>
      </div>
      <div>
        <div class="history-date">${r.date} ${r.time}</div>
      </div>
    </div>
  `).join('');
}

function rerenderResult(type){
  renderResult(type);
  showPage('result-page');
}

function shareResult(type,fourChar){
  const db=poeticDB[type];
  const text=`我在「识己·知人」测得 ${type} ${fourChar}\n\n「${db.poem}」\n\n—— ${db.figure} · ${db.poeticName}\n\n${db.figureDesc}\n\n你也来测一测？`;
  document.getElementById('share-text').innerHTML=text.replace(/\n/g,'<br>');
  document.getElementById('share-modal').classList.add('active');
}

function closeModal(){
  document.getElementById('share-modal').classList.remove('active');
}

// Expose to window for onclick
window.startTest=startTest;
window.showHistory=showHistory;
window.showIntro=showIntro;
window.shareResult=shareResult;
window.closeModal=closeModal;
window.rerenderResult=rerenderResult;
window.discardProgress=discardProgress;
window.clearAllHistory=clearAllHistory;
</script>
</body>
</html>
